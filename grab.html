<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Database Jadwal Wayang</title>

<link rel="icon" href="data:,">

<style>
body{
font-family:Arial;
background:#111;
color:#eee;
padding:30px;
}

.menu{margin-bottom:20px;}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#5a0f14;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{background:#7a161d;}

input{
padding:10px;
margin:5px;
background:#222;
border:1px solid #333;
color:white;
border-radius:5px;
}

table{
border-collapse:collapse;
width:100%;
background:#222;
margin-top:15px;
}

th,td{
padding:8px;
border:1px solid #444;
font-size:14px;
}

th{background:#333;}
td{background:#1b1b1b;}

textarea{
width:100%;
height:200px;
background:#000;
color:#0f0;
padding:10px;
margin-top:15px;
font-family:monospace;
}

.status{
margin-top:10px;
color:#00ff99;
font-weight:bold;
}

.formManual{
margin-top:15px;
padding:15px;
background:#1a1a1a;
border:1px solid #333;
}
</style>

</head>

<body>

<h1>DATABASE JADWAL WAYANG</h1>

<div class="menu">

<input id="manualLink" placeholder="Paste Link Artikel Kluban..." style="width:350px">

<button onclick="grabFeed()">Grab Artikel</button>

<button onclick="exportJS()">Export jadwal.js</button>

<input type="file" id="fileImport" style="display:none" onchange="importJS(event)">

<button onclick="document.getElementById('fileImport').click()">
Import jadwal.js
</button>

<button onclick="toggleEdit()">Edit Data</button>

</div>

<div class="formManual">

<h3>Tambah Manual</h3>

<input id="tglManual" placeholder="Tanggal contoh: 08 April 2026" style="width:200px">
<input id="dalangManual" placeholder="Nama Dalang" style="width:250px">
<input id="lokasiManual" placeholder="Lokasi" style="width:350px">

<button onclick="tambahManual()">Tambah</button>

</div>

<div class="status" id="status"></div>

<h2>Preview Table</h2>

<table id="preview">

<thead>
<tr>
<th>Tanggal</th>
<th>Dalang</th>
<th>Lokasi</th>
<th>Hapus</th>
</tr>
</thead>

<tbody></tbody>

</table>

<h2>Preview Code jadwal.js</h2>

<textarea id="output"></textarea>

<script>

let database=[]
let editMode=false

function log(msg){
document.getElementById("status").innerText=msg
}

function cleanText(text){

function cleanText(text){

if(!text) return ""

return text
.replace(/[📍🎭✨📺🔥⭐]/g,"")
.replace(/Lakon.*/i,"")
.replace(/Sinden.*/i,"")
.replace(/Bintang.*/i,"")
.replace(/Live.*/i,"")
.replace(/YouTube.*/i,"")
.replace(/Instagram.*/i,"")
.replace(/\s+/g," ")
.trim()

}

function isLokasi(text){

if(!text) return false

text=cleanText(text)

let koma=(text.match(/,/g)||[]).length

return koma>=1

}

async function grabFeed(){

log("Mengambil data artikel...")

try{

let manual=document.getElementById("manualLink").value.trim()

let target = manual || "https://www.kluban.net/feeds/posts/default"

let proxy="https://dawn-base-2f52.guntoro88.workers.dev/?url="

let res=await fetch(proxy+encodeURIComponent(target))

let html=await res.text()

parseHTML(html)

}catch(e){

log("Gagal grab artikel")
console.error(e)

}

}

function parseHTML(html){

database=[]

html = html.replace(/<br\s*\/?>/gi,"\n")

let div=document.createElement("div")
div.innerHTML=html

let text=div.innerText
.split("\n")
.map(t=>cleanText(t.trim()))
.filter(t=>t.length>2)

let tanggal=""

for(let i=0;i<text.length;i++){

let line=text[i]

if(/\d{1,2}\s\w+\s\d{4}/i.test(line)){
tanggal=line
continue
}

if(/^(ki|nyi)\s/i.test(line)){

let dalang=line
let lokasi="-"

const lokasiPattern = /(Lokasi:|Sanggar|Rumah|Balai|Pendopo|Lapangan|Gedung|Ds\.|Dsn\.|Desa|Kec\.|Kecamatan|Kab\.|Kabupaten|Kota|RT|RW)/i

let idx = line.search(lokasiPattern)

if(idx !== -1 && idx > 0){

dalang = cleanText(line.substring(0, idx))
lokasi = cleanText(line.substring(idx))

}else{

for(let j=i+1;j<=i+6;j++){

let cek=text[j] || ""

if(/^(ki|nyi)\s/i.test(cek)) break

if(isLokasi(cek)){
lokasi = cleanText(cek)
break
}

}

}

database.push({
tanggal: tanggal,
dalang: dalang,
lokasi: lokasi
})

}

}

renderTable()
generateJS()

log("Data ditemukan : "+database.length)

}
  
function tambahManual(){

let tgl=document.getElementById("tglManual").value
let dalang=document.getElementById("dalangManual").value
let lokasi=document.getElementById("lokasiManual").value

if(!tgl || !dalang) return

database.push({
tanggal:tgl,
dalang:dalang,
lokasi:lokasi||"-"
})

renderTable()
generateJS()

}

function renderTable(){

let tbody=document.querySelector("#preview tbody")

tbody.innerHTML=""

database.forEach((d,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.tanggal}</td>
<td>${d.dalang}</td>
<td>${d.lokasi}</td>
<td><button onclick="hapusJadwal(${i})">X</button></td>
`

tbody.appendChild(tr)

})

}

function hapusJadwal(i){

database.splice(i,1)

renderTable()
generateJS()

}

function toggleEdit(){

editMode=!editMode

}

function generateJS(){

let code="const JADWAL_WAYANG = [\n"

database.forEach((d,i)=>{

code+=`{
"tanggal":"${d.tanggal}",
"dalang":"${d.dalang}",
"lokasi":"${d.lokasi}"
}`

if(i<database.length-1) code+=","

code+="\n"

})

code+="];"

document.getElementById("output").value=code

}

function exportJS(){

let blob=new Blob(
[document.getElementById("output").value],
{type:"text/javascript"}
)

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="jadwal.js"

a.click()

}

function importJS(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let text=reader.result

let json=text
.replace("const JADWAL_WAYANG =","")
.replace(";","")

database=JSON.parse(json)

renderTable()
generateJS()

}

reader.readAsText(file)

}

</script>

</body>
</html>
