<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Database Jadwal Wayang</title>
  <link rel="icon" href="data:,">

  <style>
    :root {
      --bg: #111;
      --panel: #1b1b1b;
      --panel-2: #222;
      --line: #444;
      --text: #eee;
      --muted: #aaa;
      --accent: #ff0033;
      --accent-hover: #ff3355;
      --success: #00ff99;
      --input-bg: #000;
      --code: #0f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 30px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1, h2 {
      margin-top: 0;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    button:hover {
      background: var(--accent-hover);
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      background: var(--input-bg);
      color: var(--code);
      border: 1px solid var(--line);
      margin-top: 10px;
      border-radius: 6px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: var(--panel-2);
      margin-top: 15px;
    }

    th, td {
      padding: 8px;
      border: 1px solid var(--line);
      font-size: 14px;
      vertical-align: top;
      text-align: left;
    }

    th {
      background: #333;
    }

    td {
      background: var(--panel);
    }

    textarea {
      width: 100%;
      height: 220px;
      background: var(--input-bg);
      color: var(--code);
      padding: 10px;
      margin-top: 15px;
      font-family: monospace;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .status {
      margin-top: 10px;
      color: var(--success);
      font-weight: bold;
      min-height: 20px;
    }

    .section {
      margin-top: 24px;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .danger-btn {
      background: #5a0f14;
    }

    .danger-btn:hover {
      background: #7a161d;
    }

    @media (max-width: 768px) {
      body {
        padding: 18px;
      }

      button {
        width: 100%;
      }

      th, td {
        font-size: 13px;
      }

      textarea {
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <h1>DATABASE JADWAL WAYANG</h1>

  <div class="menu">
    <button onclick="grabFeed()">Ambil Data</button>
    <button onclick="tambahJadwal()">Tambah Jadwal</button>
    <button onclick="exportJS()">Export jadwal.js</button>
    <input type="file" id="fileImport" style="display:none" onchange="importJS(event)">
    <button onclick="document.getElementById('fileImport').click()">Import jadwal.js</button>
    <button onclick="toggleEdit()">Edit Data</button>
  </div>

  <div class="status" id="status"></div>

  <div class="section">
    <h2>Input Link Manual</h2>
    <div class="small">
      Bisa isi link artikel Blogger/Kluban atau biarkan kosong untuk pakai link default.
    </div>
    <input
      type="text"
      id="manualLink"
      placeholder="Masukkan link artikel, contoh: https://www.kluban.net/2026/03/jadwal-wayang-kulit-april-2026.html"
    >
  </div>

  <div class="section">
    <h2>Preview Table</h2>
    <div class="table-wrap">
      <table id="preview">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Dalang</th>
            <th>Lokasi</th>
            <th>Hapus</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <h2>Preview Code jadwal.js</h2>
    <textarea id="output"></textarea>
  </div>

  <script>
    const WORKER_PROXY = "https://dawn-base-2f52.guntoro88.workers.dev/?url=";
    const DEFAULT_ARTICLE = "https://www.kluban.net/2026/03/jadwal-wayang-kulit-april-2026.html";

    let database = [];
    let editMode = false;

    function log(msg) {
      document.getElementById("status").innerText = msg;
    }

    function normalizeSpace(text) {
      return (text || "")
        .replace(/\u00a0/g, " ")
        .replace(/\u200b/g, "")
        .replace(/[ \t]+/g, " ")
        .replace(/\s+\n/g, "\n")
        .replace(/\n\s+/g, "\n")
        .trim();
    }

    function cleanNoise(text) {
      return normalizeSpace(text)
        .replace(/[📍🎭✨🔥⭐🕰️📺]/g, "")
        .replace(/^\s*lokasi\s*:\s*/i, "")
        .replace(/^\s*tempat\s*:\s*/i, "")
        .replace(/^\s*alamat\s*:\s*/i, "")
        .replace(/\bLakon\b.*$/i, "")
        .replace(/\bSinden\b.*$/i, "")
        .replace(/\bBintang Tamu\b.*$/i, "")
        .replace(/\bLive Streaming\b.*$/i, "")
        .replace(/\bYoutube\b.*$/i, "")
        .replace(/\bInstagram\b.*$/i, "")
        .replace(/\bInfo\b.*$/i, "")
        .replace(/\bHTM\b.*$/i, "")
        .replace(/\bTiket\b.*$/i, "")
        .replace(/\s{2,}/g, " ")
        .trim();
    }

    function isNoiseLine(text) {
      const t = cleanNoise(text).toLowerCase();
      if (!t) return true;

      return [
        "lakon",
        "sinden",
        "bintang tamu",
        "live streaming",
        "youtube",
        "instagram",
        "subscribe",
        "follow",
        "share",
        "komentar"
      ].some((x) => t.includes(x));
    }

    function isDateLine(text) {
      const t = cleanNoise(text);
      return /\b\d{1,2}\s+[A-Za-zÀ-ÿ]+\s+\d{4}\b/i.test(t);
    }

    function extractDate(text) {
      const t = cleanNoise(text);
      const m = t.match(/\b\d{1,2}\s+[A-Za-zÀ-ÿ]+\s+\d{4}\b/i);
      return m ? m[0].trim() : "";
    }

    function isLikelyDalang(text) {
      const t = cleanNoise(text);
      if (!t) return false;
      return /^(ki|nyi)\s/i.test(t);
    }

    function isLikelyLocation(text) {
      const t = cleanNoise(text);
      if (!t) return false;

      const lower = t.toLowerCase();
      const keywordHit = /\b(ds|desa|dk|dukuh|dsn|dusun|kec|kecamatan|kab|kabupaten|kota|rt|rw|jl|jalan|gang|blok|komplek|alun-alun|lapangan|pendopo|pendapa|balai desa|museum|sanggar|rumah|griya|pabrik|sekolah|sma|smk|universit|university|pantai|terminal|pasar)\b/i.test(t);
      const commaCount = (t.match(/,/g) || []).length;

      if (lower.includes("lakon")) return false;
      if (lower.includes("sinden")) return false;
      if (lower.includes("bintang tamu")) return false;
      if (lower.includes("live streaming")) return false;

      return keywordHit || commaCount >= 1;
    }

    function cleanDalang(text) {
      let t = cleanNoise(text);

      t = t
        .replace(/\s*[-|]\s*lokasi\s*:.*$/i, "")
        .replace(/\s*[-|]\s*tempat\s*:.*$/i, "")
        .replace(/\s*📍.*$/i, "")
        .replace(/\s*lokasi\s*:.*$/i, "")
        .replace(/\s*tempat\s*:.*$/i, "")
        .replace(/\s{2,}/g, " ")
        .trim();

      return t;
    }

    function cleanLokasi(text, dalang = "") {
      let t = cleanNoise(text);

      t = t
        .replace(/^lokasi\s*:\s*/i, "")
        .replace(/^tempat\s*:\s*/i, "")
        .replace(/^alamat\s*:\s*/i, "")
        .replace(/\bBT\s*:.*$/i, "")
        .replace(/\bBintang Tamu\b.*$/i, "")
        .replace(/\bLakon\b.*$/i, "")
        .replace(/\bSinden\b.*$/i, "")
        .replace(/\bLive Streaming\b.*$/i, "")
        .replace(/\bYoutube\b.*$/i, "")
        .replace(/\bInstagram\b.*$/i, "")
        .trim();

      if (dalang) {
        const escaped = dalang.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        t = t.replace(new RegExp(`\\s*-\\s*${escaped}\\s*$`, "i"), "").trim();
        t = t.replace(new RegExp(`\\b${escaped}\\b`, "i"), (match, offset) => {
          return offset > Math.max(0, t.length - match.length - 3) ? "" : match;
        }).trim();
      }

      t = t.replace(/\s{2,}/g, " ").replace(/\s+,/g, ",").trim();
      return t;
    }

    function splitDalangList(text) {
      const source = cleanDalang(text)
        .replace(/\)\s+(?=(Ki|Nyi)\s)/g, ")|")
        .replace(/\s{2,}(?=(Ki|Nyi)\s)/g, "|");

      return source
        .split("|")
        .map((x) => cleanDalang(x))
        .filter(Boolean);
    }

    function splitDalangLokasi(line) {
      const raw = cleanNoise(line);
      if (!isLikelyDalang(raw)) return null;

      const markers = ["📍", "Lokasi:", "lokasi:", "Tempat:", "tempat:", "Alamat:", "alamat:"];
      let splitIndex = -1;

      for (const marker of markers) {
        const idx = raw.indexOf(marker);
        if (idx > 0 && (splitIndex === -1 || idx < splitIndex)) {
          splitIndex = idx;
        }
      }

      let dalangPart = raw;
      let lokasiPart = "";

      if (splitIndex > -1) {
        dalangPart = raw.slice(0, splitIndex).trim();
        lokasiPart = raw.slice(splitIndex).trim();
      } else {
        const dashMatch = raw.match(/^(.*?)(?:\s+-\s+)(.+)$/);
        if (dashMatch && isLikelyLocation(dashMatch[2])) {
          dalangPart = dashMatch[1].trim();
          lokasiPart = dashMatch[2].trim();
        }
      }

      const dalangList = splitDalangList(dalangPart);
      const lokasi = cleanLokasi(lokasiPart, dalangList[0] || "");

      if (!dalangList.length) return null;

      return {
        dalangList,
        lokasi
      };
    }

    function extractArticleHTML(rawText) {
      try {
        const json = JSON.parse(rawText);
        if (json.feed?.entry?.length) {
          const entry = json.feed.entry[0];
          return entry.content?.$t || entry.summary?.$t || "";
        }
      } catch (_) {}

      const doc = new DOMParser().parseFromString(rawText, "text/html");
      const selectors = [
        ".post-body",
        ".post-body.entry-content",
        ".entry-content",
        "article",
        ".post"
      ];

      for (const selector of selectors) {
        const el = doc.querySelector(selector);
        if (el && el.innerHTML.trim()) {
          return el.innerHTML;
        }
      }

      return rawText;
    }

    function extractLines(html) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = html.replace(/<br\s*\/?>/gi, "<br>\n");

      const lines = [];
      const blocks = wrapper.querySelectorAll("p, li, div");

      if (blocks.length) {
        blocks.forEach((node) => {
          const raw = normalizeSpace(node.innerText);
          raw.split(/\n+/).forEach((part) => {
            const cleaned = cleanNoise(part);
            if (cleaned && !isNoiseLine(cleaned)) {
              lines.push(cleaned);
            }
          });
        });
      } else {
        normalizeSpace(wrapper.innerText).split(/\n+/).forEach((part) => {
          const cleaned = cleanNoise(part);
          if (cleaned && !isNoiseLine(cleaned)) {
            lines.push(cleaned);
          }
        });
      }

      return lines.filter(Boolean);
    }

    function collectLocation(lines, startIndex) {
      const parts = [];

      for (let i = startIndex; i < Math.min(lines.length, startIndex + 4); i++) {
        const line = cleanNoise(lines[i]);

        if (!line) continue;
        if (isDateLine(line)) break;
        if (isLikelyDalang(line)) break;
        if (isNoiseLine(line)) continue;

        const cleaned = cleanLokasi(line);
        if (!cleaned) continue;

        parts.push(cleaned);

        if (isLikelyLocation(cleaned)) {
          break;
        }
      }

      const uniqueParts = [...new Set(parts)];
      return cleanLokasi(uniqueParts.join(", "));
    }

    function parseHTML(html) {
      database = [];

      const lines = extractLines(html);
      let tanggalAktif = "";

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (isDateLine(line)) {
          tanggalAktif = extractDate(line);
          continue;
        }

        const parsed = splitDalangLokasi(line);
        if (!parsed || !tanggalAktif) continue;

        let lokasi = parsed.lokasi;

        if (!lokasi) {
          lokasi = collectLocation(lines, i + 1);
        }

        parsed.dalangList.forEach((dalang) => {
          const finalDalang = cleanDalang(dalang);
          const finalLokasi = cleanLokasi(lokasi, finalDalang) || "-";

          if (!finalDalang) return;

          database.push({
            tanggal: tanggalAktif,
            dalang: finalDalang,
            lokasi: finalLokasi
          });
        });
      }

      database = dedupeDatabase(database);

      renderTable();
      generateJS();
      log("Parse selesai. Total data: " + database.length);
    }

    function dedupeDatabase(data) {
      const seen = new Set();
      return data.filter((item) => {
        const key = [
          item.tanggal.trim().toLowerCase(),
          item.dalang.trim().toLowerCase(),
          item.lokasi.trim().toLowerCase()
        ].join("|");

        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    async function grabFeed() {
      log("Mengambil data artikel...");

      try {
        const manual = document.getElementById("manualLink").value.trim();
        const target = manual || DEFAULT_ARTICLE;
        const res = await fetch(WORKER_PROXY + encodeURIComponent(target));
        const raw = await res.text();
        const articleHTML = extractArticleHTML(raw);

        if (!articleHTML || !articleHTML.trim()) {
          throw new Error("Konten artikel kosong");
        }

        parseHTML(articleHTML);
      } catch (err) {
        console.error(err);
        log("Gagal mengambil atau parse data");
      }
    }

    function renderTable() {
      const tbody = document.querySelector("#preview tbody");
      tbody.innerHTML = "";

      database.forEach((d, i) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${escapeHTML(d.tanggal)}</td>
          <td>${escapeHTML(d.dalang)}</td>
          <td>${escapeHTML(d.lokasi)}</td>
          <td><button class="danger-btn" onclick="hapusJadwal(${i})">X</button></td>
        `;

        if (editMode) {
          tr.querySelectorAll("td").forEach((td, index) => {
            if (index < 3) {
              td.contentEditable = "true";
              td.oninput = () => {
                if (index === 0) database[i].tanggal = td.innerText.trim();
                if (index === 1) database[i].dalang = td.innerText.trim();
                if (index === 2) database[i].lokasi = td.innerText.trim();
                generateJS();
              };
            }
          });
        }

        tbody.appendChild(tr);
      });
    }

    function escapeHTML(text) {
      return (text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function tambahJadwal() {
      database.push({
        tanggal: "",
        dalang: "",
        lokasi: ""
      });

      renderTable();
      generateJS();
    }

    function hapusJadwal(i) {
      database.splice(i, 1);
      renderTable();
      generateJS();
    }

    function toggleEdit() {
      editMode = !editMode;
      renderTable();
      log(editMode ? "Mode edit aktif" : "Mode edit mati");
    }

    function generateJS() {
      const code = "const JADWAL_WAYANG = " + JSON.stringify(database, null, 2) + ";";
      document.getElementById("output").value = code;
    }

    function exportJS() {
      const blob = new Blob([document.getElementById("output").value], {
        type: "text/javascript"
      });

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "jadwal.js";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importJS(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function () {
        try {
          const text = reader.result;
          const json = text
            .replace(/^const\s+JADWAL_WAYANG\s*=\s*/i, "")
            .replace(/;?\s*$/, "");

          database = JSON.parse(json);
          renderTable();
          generateJS();
          log("jadwal.js berhasil diimport");
        } catch (err) {
          console.error(err);
          log("Import gagal. Format file tidak valid");
        }
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
