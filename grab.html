<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Database Jadwal Wayang</title>

<link rel="icon" href="data:,">

<style>
body{
font-family:Arial;
background:#111;
color:#eee;
padding:30px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#5a0f14;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{background:#7a161d;}

input{
padding:10px;
margin:5px;
background:#222;
border:1px solid #333;
color:white;
border-radius:5px;
}

table{
border-collapse:collapse;
width:100%;
background:#222;
margin-top:15px;
}

th,td{
padding:8px;
border:1px solid #444;
}

th{background:#333;}

textarea{
width:100%;
height:200px;
background:#000;
color:#0f0;
padding:10px;
margin-top:15px;
font-family:monospace;
}

.status{
margin-top:10px;
color:#00ff99;
font-weight:bold;
}
</style>
</head>

<body>

<h1>DATABASE JADWAL WAYANG</h1>

<input id="manualLink" placeholder="Paste Link Artikel Kluban..." style="width:350px">

<button onclick="grabFeed()">Grab Artikel</button>
<button onclick="exportJS()">Export jadwal.js</button>

<div class="status" id="status"></div>

<h2>Preview Table</h2>

<table id="preview">
<thead>
<tr>
<th>Tanggal</th>
<th>Dalang</th>
<th>Lokasi</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Preview Code jadwal.js</h2>

<textarea id="output"></textarea>

<script>

let database=[]

function log(msg){
document.getElementById("status").innerText=msg
}

function clean(t){

return t
.replace(/[📍🎭✨🔥⭐]/g,"")
.replace(/Lokasi:/gi,"")
.replace(/Lakon.*/i,"")
.replace(/Sinden.*/i,"")
.replace(/Bintang.*/i,"")
.replace(/Live.*/i,"")
.replace(/\s+/g," ")
.trim()

}

async function grabFeed(){

log("Mengambil feed...")

let proxy="https://dawn-base-2f52.guntoro88.workers.dev/?url="

let target=document.getElementById("manualLink").value.trim()

if(!target){
target="https://www.kluban.net/feeds/posts/default?alt=json"
}

let res=await fetch(proxy+encodeURIComponent(target))

let data=await res.json()

parseFeed(data)

}

function parseFeed(feed){

database=[]

let entry=feed.feed.entry[0]

let html=entry.content.$t

let div=document.createElement("div")
div.innerHTML=html

let p=div.querySelectorAll("p")

let tanggal=""
let dalang=""
let lokasi=""

p.forEach(el=>{

let text=clean(el.innerText)

if(!text) return

if(/\d{1,2}\s\w+\s\d{4}/i.test(text)){

tanggal=text
dalang=""
lokasi=""
return

}

if(/^(ki|nyi)\s/i.test(text)){

dalang=text
return

}

if(tanggal && dalang && lokasi===""){

lokasi=text

database.push({
tanggal,
dalang,
lokasi
})

}

})

renderTable()
generateJS()

log("Data ditemukan : "+database.length)

}

function renderTable(){

let tbody=document.querySelector("#preview tbody")
tbody.innerHTML=""

database.forEach(d=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.tanggal}</td>
<td>${d.dalang}</td>
<td>${d.lokasi}</td>
`

tbody.appendChild(tr)

})

}

function generateJS(){

let code="const JADWAL_WAYANG = [\n"

database.forEach((d,i)=>{

code+=`{
"tanggal":"${d.tanggal}",
"dalang":"${d.dalang}",
"lokasi":"${d.lokasi}"
}`

if(i<database.length-1) code+=","

code+="\n"

})

code+="];"

document.getElementById("output").value=code

}

function exportJS(){

let blob=new Blob(
[document.getElementById("output").value],
{type:"text/javascript"}
)

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="jadwal.js"
a.click()

}

</script>

</body>
</html>
