<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Grab Jadwal Wayang</title>

<link rel="icon" href="data:,">

<style>
body{
font-family:Arial,Helvetica,sans-serif;
padding:20px;
background:#f5f5f5
}

.container{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.1)
}

input{
width:100%;
padding:10px;
margin-bottom:10px
}

button{
padding:10px 15px;
margin-right:10px;
cursor:pointer
margin-bottom:10px
}

textarea{
width:100%;
height:200px;
margin-top:15px
}

#log{
margin-top:10px;
color:green;
font-weight:bold
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px
}

table th, table td{
border:1px solid #ddd;
padding:8px;
font-size:14px
}

table th{
background:#333;
color:white
}

</style>

</head>

<body>

<div class="container">

<h2>Tool Grab Jadwal Wayang</h2>

<input
id="manualLink"
placeholder="Masukkan Link Artikel Kluban..."

>

<button onclick="grabFeed()">Ambil Data</button> <button onclick="exportJS()">Export JS</button> <button onclick="copyJS()">Copy</button> <button onclick="clearData()">Clear</button>

<div id="log"></div>

<h3>Preview Data</h3>

<table id="preview">
<thead>
<tr>
<th>No</th>
<th>Judul</th>
<th>Lokasi</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Output JS</h3>
<textarea id="output"></textarea>

</div>

<script>

let DATABASE = []

function log(msg){

document.getElementById("log").innerText = msg

}

function renderTable(){

let tbody = document.querySelector("#preview tbody")

tbody.innerHTML = ""

DATABASE.forEach((item,i)=>{

let tr = document.createElement("tr")

tr.innerHTML = `
<td>${i+1}</td>
<td>${item.judul}</td>
<td>${item.lokasi}</td>
`

tbody.appendChild(tr)

})

}

function parseHTML(html){

log("Parsing HTML...")

let parser = new DOMParser()

let doc = parser.parseFromString(html,"text/html")

let text = doc.body.innerText

let lines = text.split("\n")

DATABASE = []

lines.forEach(line=>{

if(line.includes(",")){

let parts = line.split(",")

if(parts.length >= 2){

DATABASE.push({

judul:parts[0].trim(),

lokasi:parts[1].trim()

})

}

}

})

log("Data ditemukan : "+DATABASE.length)

renderTable()

}

async function grabFeed(){

log("Mengambil data artikel...")

try{

let manual = document.getElementById("manualLink").value.trim()

let target = manual 
? manual 
: "https://www.kluban.net/feeds/posts/default"

let proxy = "https://dawn-base-2f52.guntoro88.workers.dev/?url="

let url = proxy + encodeURIComponent(target)

console.log("Grab URL:", url)

const res = await fetch(url)

const html = await res.text()

parseHTML(html)

}catch(err){

log("Gagal mengambil data")
console.error(err)

}

}

function exportJS(){

let text = "const JADWAL_WAYANG = "

text += JSON.stringify(DATABASE,null,2)

text += ";"


document.getElementById("output").value = text

log("Export selesai")

}

function copyJS(){

let textarea = document.getElementById("output")

textarea.select()

document.execCommand("copy")

log("Disalin ke clipboard")

}

function clearData(){

DATABASE = []

document.querySelector("#preview tbody").innerHTML = ""

document.getElementById("output").value = ""

log("Data dibersihkan")

}

</script>

</body>
</html>
