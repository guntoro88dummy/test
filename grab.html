<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Grab Jadwal Wayang</title>

<link rel="icon" href="data:,">

<style>
body{
font-family:Arial,Helvetica,sans-serif;
padding:20px;
background:#0b0b0b;
color:#eee
}

.container{
background:#111;
padding:20px;
border-radius:8px;
box-shadow:0 0 20px rgba(0,0,0,.5)
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
background:#1a1a1a;
border:1px solid #333;
color:white
}

button{
padding:10px 15px;
margin-right:10px;
cursor:pointer;
margin-bottom:10px;
background:#5a0f14;
color:white;
border:none;
border-radius:4px
}

button:hover{
background:#7a161d
}

textarea{
width:100%;
height:200px;
margin-top:15px;
background:#1a1a1a;
color:white;
border:1px solid #333
}

#log{
margin-top:10px;
color:#ff8c8c;
font-weight:bold
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:#111
}

table th, table td{
border:1px solid #333;
padding:8px;
font-size:14px
}

table th{
background:#5a0f14;
color:white
}

.editBtn{
background:#333;
padding:5px 8px
}

</style>

</head>

<body>

<div class="container">

<h2>Tool Grab Jadwal Wayang</h2>

<input id="manualLink" placeholder="Masukkan Link Artikel Kluban...">

<button onclick="grabFeed()">Grab Data</button> <button onclick="exportJS()">Export JS</button> <button onclick="addManual()">Tambah Manual</button> <button onclick="clearData()">Clear</button>

<div id="log"></div>

<h3>Preview Jadwal</h3>

<table id="preview">
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Dalang</th>
<th>Lokasi</th>
<th>Edit</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Output JS</h3>
<textarea id="output"></textarea>

</div>

<script>

let DATABASE = []

function log(msg){

document.getElementById("log").innerText = msg

}

function renderTable(){

let tbody = document.querySelector("#preview tbody")

tbody.innerHTML = ""

DATABASE.forEach((item,i)=>{

let tr = document.createElement("tr")

tr.innerHTML = `
<td>${i+1}</td>
<td>${item.tanggal}</td>
<td>${item.dalang}</td>
<td>${item.lokasi}</td>
<td><button class="editBtn" onclick="editData(${i})">Edit</button></td>
`


tbody.appendChild(tr)

})

}

function parseHTML(html){

log("Parsing HTML...")

let parser = new DOMParser()

let doc = parser.parseFromString(html,"text/html")

let text = doc.body.innerText

let lines = text.split("\n")

DATABASE = []

lines.forEach(line=>{

if(line.includes(",")){

let parts = line.split(",")

if(parts.length >= 3){

DATABASE.push({

tanggal:parts[0].trim(),

dalang:parts[1].trim(),

lokasi:parts.slice(2).join(",").trim()

})

}

}

})

log("Data ditemukan : "+DATABASE.length)

renderTable()

}

async function grabFeed(){

log("Mengambil data...")

try{

let manual = document.getElementById("manualLink").value.trim()

let target = manual 
? manual 
: "https://www.kluban.net/feeds/posts/default"

let proxy = "https://dawn-base-2f52.guntoro88.workers.dev/?url="

let url = proxy + encodeURIComponent(target)

const res = await fetch(url)

const html = await res.text()

parseHTML(html)

}catch(err){

log("Gagal mengambil data")
console.error(err)

}

}

function editData(i){

let t = prompt("Tanggal", DATABASE[i].tanggal)
let d = prompt("Dalang", DATABASE[i].dalang)
let l = prompt("Lokasi", DATABASE[i].lokasi)

DATABASE[i]={

tanggal:t,

dalang:d,

lokasi:l

}

renderTable()

}

function addManual(){

let t = prompt("Tanggal")
let d = prompt("Nama Dalang")
let l = prompt("Lokasi")

DATABASE.push({

tanggal:t,

dalang:d,

lokasi:l

})

renderTable()

}

function exportJS(){

let text = "const JADWAL_WAYANG = "

text += JSON.stringify(DATABASE,null,2)

text += ";"


document.getElementById("output").value = text

log("Export selesai")

}

function clearData(){

DATABASE=[]

renderTable()

log("Data dibersihkan")

}

</script>

</body>
</html>
