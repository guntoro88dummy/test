<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Database Jadwal Wayang</title>

<link rel="icon" href="data:,">

<style>
body{
font-family:Arial;
background:#111;
color:#eee;
padding:30px;
}

.menu{margin-bottom:20px;}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#5a0f14;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{background:#7a161d;}

input{
padding:10px;
width:350px;
background:#222;
border:1px solid #333;
color:white;
border-radius:5px;
}

table{
border-collapse:collapse;
width:100%;
background:#222;
margin-top:15px;
}

th,td{
padding:8px;
border:1px solid #444;
font-size:14px;
}

th{background:#333;}
td{background:#1b1b1b;}

textarea{
width:100%;
height:200px;
background:#000;
color:#0f0;
padding:10px;
margin-top:15px;
font-family:monospace;
}

.status{
margin-top:10px;
color:#00ff99;
font-weight:bold;
}
</style>

</head>

<body>

<h1>DATABASE JADWAL WAYANG</h1>

<div class="menu">

<input id="manualLink" placeholder="Paste Link Artikel Kluban...">

<button onclick="grabFeed()">Grab Artikel</button>

<button onclick="tambahJadwal()">Tambah Jadwal</button>

<button onclick="exportJS()">Export jadwal.js</button>

<input type="file" id="fileImport" style="display:none" onchange="importJS(event)">

<button onclick="document.getElementById('fileImport').click()">
Import jadwal.js
</button>

<button onclick="toggleEdit()">Edit Data</button>

</div>

<div class="status" id="status"></div>

<h2>Preview Table</h2>

<table id="preview">

<thead>
<tr>
<th>Tanggal</th>
<th>Dalang</th>
<th>Lokasi</th>
<th>Hapus</th>
</tr>
</thead>

<tbody></tbody>

</table>

<h2>Preview Code jadwal.js</h2>

<textarea id="output"></textarea>

<script>

let database=[]
let editMode=false

function log(msg){
document.getElementById("status").innerText=msg
}

function isLokasi(text){

if(!text) return false

let lower=text.toLowerCase()

if(lower.includes("bintang")) return false
if(lower.includes("lakon")) return false
if(lower.includes("sinden")) return false
if(lower.includes("live")) return false

let wilayah=/\b(ds|desa|kec|kecamatan|kab|kota|rt|rw)\b/i.test(text)

let tempat=/\b(alun-alun|lapangan|balai desa|pendopo)\b/i.test(text)

let koma=(text.match(/,/g)||[]).length

return wilayah || tempat || koma>=1

}

async function grabFeed(){

log("Mengambil data artikel...")

try{

let manual=document.getElementById("manualLink").value.trim()

let target = manual || "https://www.kluban.net/feeds/posts/default"

let proxy="https://dawn-base-2f52.guntoro88.workers.dev/?url="

let res=await fetch(proxy+encodeURIComponent(target))

let html=await res.text()

parseHTML(html)

}catch(e){

log("Gagal grab artikel")
console.error(e)

}

}

function parseHTML(html){

database=[]

html=html.replace(/<br\s*\/?>/gi,"\n")

let div=document.createElement("div")

div.innerHTML=html

let text=div.innerText
.replace(/Lakon:.*/gi,"")
.replace(/Sinden:.*/gi,"")
.replace(/Live Streaming:.*/gi,"")
.replace(/YouTube.*/gi,"")
.replace(/Instagram.*/gi,"")
.replace(/Bintang Tamu.*/gi,"")
.replace(/✨.*/gi,"")
.split("\n")
.map(t=>t.trim())
.filter(t=>t.length>1)

let tanggal=""

for(let i=0;i<text.length;i++){

let line=text[i]

if(/\d{1,2}\s\w+\s\d{4}/i.test(line)){
tanggal=line
continue
}

if(/^(ki|nyi)\s/i.test(line)){

let parts=line.split("📍")

let dalangText=parts[0].trim()

let lokasi="-"

if(parts.length>1){

let teksLokasi=parts[1]
.replace(/🎭.*/,"")
.replace(/✨.*/,"")
.replace(/📺.*/,"")
.trim()

if(isLokasi(teksLokasi)){
lokasi=teksLokasi
}

}

if(lokasi=="-"){

for(let j=i+1;j<=i+8;j++){

let cek=text[j] || ""

if(/^(ki|nyi)\s/i.test(cek)) break

let teksLokasi=cek.replace("📍","").trim()

if(isLokasi(teksLokasi)){
lokasi=teksLokasi
break
}

}

}

let dalangList=dalangText
.replace(/\)\s*(Ki|Nyi)/gi,")|$1")
.split("|")

dalangList.forEach(d=>{

database.push({
tanggal,
dalang:d.trim(),
lokasi
})

})

}

}

renderTable()

generateJS()

log("Parse selesai. Total data: "+database.length)

}

function renderTable(){

let tbody=document.querySelector("#preview tbody")

tbody.innerHTML=""

database.forEach((d,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${d.tanggal}</td>
<td>${d.dalang}</td>
<td>${d.lokasi}</td>
<td><button onclick="hapusJadwal(${i})">X</button></td>
`

if(editMode){

tr.querySelectorAll("td").forEach((td,index)=>{

if(index<3){

td.contentEditable=true


td.oninput=()=>{

if(index==0) database[i].tanggal=td.innerText
if(index==1) database[i].dalang=td.innerText
if(index==2) database[i].lokasi=td.innerText

generateJS()

}

}

})

}


tbody.appendChild(tr)

})

}

function tambahJadwal(){

database.push({
tanggal:"",
dalang:"",
lokasi:""
})

renderTable()

generateJS()

}

function hapusJadwal(i){

database.splice(i,1)

renderTable()

generateJS()

}

function toggleEdit(){

editMode=!editMode

renderTable()

log(editMode?"Mode edit aktif":"Mode edit mati")

}

function generateJS(){

let code="const JADWAL_WAYANG = "+JSON.stringify(database,null,2)+";"


document.getElementById("output").value=code

}

function exportJS(){

let blob=new Blob(
[document.getElementById("output").value],
{type:"text/javascript"}
)

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="jadwal.js"

a.click()

}

function importJS(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let text=reader.result

let json=text
.replace("const JADWAL_WAYANG =","")
.replace(";","")

database=JSON.parse(json)

renderTable()

generateJS()

log("jadwal.js berhasil diimport")

}

reader.readAsText(file)

}

</script>

</body>
</html>
