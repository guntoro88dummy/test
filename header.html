<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Header AJI MANGKARA</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #0f0f0f;
      color: white;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      z-index: 100;
      border-bottom: 1px solid #222;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .header.scrolled {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      border-bottom: 1px solid #333;
    }

    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      height: 100%;
      box-sizing: border-box;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      min-width: 0;
    }

    .menu-toggle {
      font-size: 22px;
      cursor: pointer;
      user-select: none;
    }

    .logo-area img {
      height: 24px;
      display: block;
    }

    .logo-link {
      text-decoration: none;
      color: #ffffff;
      white-space: nowrap;
    }

    .search-ad {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      border-radius: 20px;
      background: #121212;
      border: 1px solid #333;
      color: #aaa;
      max-width: 650px;
      margin-left: 40px;
      margin-right: 10px;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      overflow: hidden;
      white-space: nowrap;
    }

    .voice-btn {
      width: 40px;
      height: 40px;
      background: #181818;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      margin-right: 330px;
      flex-shrink: 0;
    }

    .right-menu {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    .create-btn {
      background: #272727;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .notif {
      position: relative;
      font-size: 18px;
      cursor: pointer;
    }

    .notif-badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background: red;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .channel-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: block;
    }

    @media (max-width: 900px) {
      .voice-btn,
      .create-btn,
      .notif,
      .logo-area span {
        display: none;
      }

      .header-bar {
        flex-wrap: nowrap;
        min-width: 0;
      }

      .search-ad {
        max-width: 50%;
        min-width: 0;
        margin-left: 5px;
        margin-right: 5px;
      }

      .right-menu {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-bar">
      <div class="logo-area">
        <div id="menu-toggle" class="menu-toggle">☰</div>

        <a href="https://ajimangkara.com">
          <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="Aji Mangkara">
        </a>

        <span>
          <a href="http://ajimangkara.com" class="logo-link">AJI MANGKARA</a>
        </span>
      </div>

      <a id="search-ad-link" href="#" class="search-ad" target="_blank"></a>

      <div class="voice-btn">
        <i class="fa-solid fa-microphone"></i>
      </div>

      <div class="right-menu">
        <button class="create-btn">
          <i class="fa-solid fa-plus"></i> Create
        </button>

        <div class="notif">
          <i class="fa-solid fa-bell"></i>
          <span class="notif-badge">9+</span>
        </div>

        <img
          class="channel-avatar"
          src="https://yt3.googleusercontent.com/I0hZhWUt1nFTaHCpN_ZTko0C5yCDa_-ofvu78AK5mWNbgN9cuFKx9oNKRANomISQ34vraEXkIZQ=s160"
          alt="Channel Avatar"
        >
      </div>
    </div>
  </header>
</body>
</html>
