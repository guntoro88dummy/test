<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Channel Portal</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="topbar">

<div class="channel-info">

<img id="channel-logo" class="logo">

<div class="channel-text">

<h1 id="channel-name"></h1>
<p id="channel-handle"></p>
<p id="subscriber-count"></p>

</div>

</div>

<button id="more-btn">☰</button>

</header>



<div class="layout">


<main class="main-content">

<div id="hero-video" class="hero"></div>



<h2>Shorts</h2>

<div id="shorts" class="shorts-row"></div>



<h2>Videos</h2>

<div id="videos" class="video-grid"></div>



<h2>Past Live</h2>

<div id="live" class="video-grid"></div>


</main>



<aside class="sidebar">

<h2>🔥 Sedang Trending</h2>

<div id="trending" class="trend-list"></div>

</aside>


</div>



<div id="popup" class="popup">

<div class="popup-content">

<button id="close-popup">Close</button>

<p>Menu</p>

</div>

</div>



<script src="config.js"></script>
<script src="script.js"></script>


</body>
</html>
