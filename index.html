<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aji Mangkara Video Portal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- HEADER -->
<header class="header">
<div class="logo">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
<span>AJI MANGKARA</span>
</div>
</header>


<div class="container">

<!-- LEFT CONTENT -->
<div class="main">

<!-- HERO VIDEO -->
<section class="hero">
<div id="hero-video"></div>
</section>


<!-- CHANNEL INFO -->
<section class="channel-info">

<div class="channel-header">

<img id="channel-logo">

<div>
<h2 id="channel-name"></h2>
<p id="subscriber-count"></p>
</div>

<button id="subscribe-btn">Subscribe</button>

</div>

<p id="channel-desc"></p>

</section>


<!-- SHORTS -->
<section>

<h3>Shorts</h3>

<div id="shorts" class="video-grid"></div>

</section>


<!-- VIDEOS -->
<section>

<h3>Videos</h3>

<div id="videos" class="video-grid"></div>

</section>


<!-- PAST LIVE -->
<section>

<h3>Past Live Streams</h3>

<div id="live" class="video-grid"></div>

</section>


</div>


<!-- SIDEBAR -->
<aside class="sidebar">

<div class="trending">
<h3>🔥 Sedang Trending</h3>
<div id="trending"></div>
</div>


<div class="ads">PASANG IKLAN DISINI</div>
<div class="ads">PASANG IKLAN DISINI</div>
<div class="ads">PASANG IKLAN DISINI</div>
<div class="ads">PASANG IKLAN DISINI</div>


</aside>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
