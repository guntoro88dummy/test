<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aji Mangkara Video Portal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">
<h2>AJI MANGKARA</h2>
</header>

<div class="container">

<div class="left">

<!-- HERO + TRENDING -->
<div class="top-section">

<div class="hero">
<div id="hero-video"></div>
</div>

<div class="trending">
<h3>🔥 Sedang Trending</h3>
<div id="trending"></div>
</div>

</div>

<!-- CHANNEL INFO -->
<div class="channel-info">

<div class="channel-header">

<img id="channel-logo">

<div>
<h2 id="channel-name"></h2>
<p id="subscriber-count"></p>
</div>

<button id="subscribe-btn">Subscribe</button>

</div>

<p id="channel-desc"></p>

</div>

<!-- SHORTS -->
<section>

<h3>Shorts</h3>

<div id="shorts" class="shorts-scroll"></div>

</section>

<!-- VIDEOS -->
<section>

<h3>Videos</h3>

<div id="videos" class="video-grid"></div>

</section>

<!-- LIVE -->
<section>

<h3>Past Live Streaming</h3>

<div id="live" class="video-grid"></div>

</section>

</div>

<!-- RIGHT SIDEBAR -->
<div class="sidebar">

<div class="ads">PASANG IKLAN</div>
<div class="ads">PASANG IKLAN</div>
<div class="ads">PASANG IKLAN</div>
<div class="ads">PASANG IKLAN</div>

</div>

</div>

</body>
