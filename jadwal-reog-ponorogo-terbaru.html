document.getElementById("modal-close").onclick=function(){

};

const modal = document.getElementById("poster-modal");

modal.onclick = function(e){
  if(e.target === modal){
    modal.style.display = "none";
  }
};
document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    modal.style.display = "none";
  }
});
