<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>JADWAL REOG PONOROGO APRIL 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
<style>
body{
margin:0;
font-family:'Roboto', sans-serif;
background:#0f0f0f;
color:white;
}

html{
scroll-behavior:smooth;
}

/* HEADER UTAMA */
.header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:9999;
border-bottom:1px solid #222;
background:rgba(15,15,15,0.85);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
transition:all .3s ease;
}

/* SHADOW SAAT SCROLL */
.header.scrolled{
box-shadow:0 4px 15px rgba(0,0,0,0.6);
border-bottom:1px solid #333;
}

/* SCROLL LOCK HEADER FIX */
.header-bar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
}

.header{
height:60px;
}

/* LOGO */

.logo-area{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:700;
}

.logo-area img{
height:24px;
}

/* SEARCH BAR (AFFILIATE SLOT) */

.search-ad{
flex:1;
display:flex;
align-items:center;
justify-content:center;
height:40px;
border-radius:20px;
background:#121212;
border:1px solid #333;
color:#aaa;
max-width:650px;
margin-left:40px;   /* dorong ke kanan */
margin-right:10px;  /* dekatkan ke mic */
cursor:pointer;
transition:.2s;
}


/* VOICE BUTTON */

.voice-btn{
width:40px;
height:40px;
background:#181818;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:16px;
margin-right:330px; /* jarak ke notif/menu */
}

/* RIGHT MENU */

.right-menu{
display:flex;
align-items:center;
gap:18px;
}

/* CREATE BUTTON */

.create-btn{
background:#272727;
border:none;
color:white;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

/* NOTIFICATION */

.notif{
position:relative;
font-size:18px;
cursor:pointer;
}

.notif-badge{
position:absolute;
top:-6px;
right:-8px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:10px;
}

/* AVATAR */

.channel-avatar{
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}
  
/* LAYOUT */
.layout{
max-width:1200px;
margin:auto;
padding:90px 20px;
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:5px;
letter-spacing:1px;
}

.subtitle{
font-size:14px;
letter-spacing:1px;
margin-bottom:20px;
opacity:0.7;
}

/* BUTTON */
.button-group{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

.btn{
display:flex;
align-items:center;
gap:6px;
padding:10px 16px;
border-radius:25px;
font-size:13px;
font-weight:bold;
text-decoration:none;
color:white;
}

.btn svg{width:16px;height:16px;}

.btn-primary{background:#25D366;}
.btn-warning{background:#ff9800;}
.btn-secondary{background:#333;}

/* TODAY BOX */
.today-section{
background:#1a1a1a;
padding:15px;
border-radius:14px;
margin-bottom:30px;
}

.today-title{
font-size:16px;
margin-bottom:10px;
font-weight:bold;
color:#ffcc00;
letter-spacing:1px;
}

#today-carousel{
display:flex;
overflow-x:auto;
gap:12px;
scroll-snap-type:x mandatory;
}

.today-card{
min-width:140px;
border-radius:12px;
overflow:hidden;
position:relative;
cursor:pointer;
scroll-snap-align:start;
}

.today-card img{
width:100%;
height:140px;
object-fit:cover;
}

/* GRID */
#poster-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:14px;
}

.poster-card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
position:relative;
touch-action:manipulation;
}

.poster-card img{
width:100%;
height:160px;
object-fit:cover;
}

 .poster-card,
.today-card{
cursor:pointer;
-webkit-tap-highlight-color:transparent;
}
  
/* BADGE */
.badge-date{
position:absolute;
top:8px;
right:8px;
background:red;
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-weight:bold;
z-index:2;
}

.badge-trending{
position:absolute;
top:8px;
left:8px;
background:#ffcc00;
color:black;
font-size:11px;
padding:4px 6px;
border-radius:6px;
font-weight:bold;
z-index:2;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* OVERLAY */
.overlay{
position:absolute;
bottom:0;
width:100%;
text-align:center;
font-weight:bold;
pointer-events:none;
}

.overlay-normal{
background:rgba(50,50,50,0.85);
font-size:12px;
padding:6px;
}

.overlay-hot{
background:rgba(255,0,0,0.95);
font-size:14px;
padding:8px;
}

/* IKLAN */
.ads-label{
position:absolute;
top:6px;
left:6px;
background:yellow;
color:black;
font-size:10px;
padding:2px 6px;
border-radius:4px;
font-weight:bold;
}

/* MODAL */
#poster-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.98);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;

opacity:0;
pointer-events:none;
transition:opacity .2s;
}

#poster-modal img{
max-width:90%;
max-height:80vh;
}

/* CLOSE BUTTON */
#modal-close{
position:absolute;
top:20px;
right:20px;
font-size:28px;
cursor:pointer;
background:rgba(0,0,0,0.6);
padding:8px 12px;
border-radius:50%;
z-index:10000;
}

/* MOBILE */
@media(max-width:900px){
#poster-grid{
grid-template-columns:repeat(2, 1fr);
gap:12px;
}
}
  
  /* ============================= */
/* MOBILE LAYOUT IMPROVEMENT     */
/* ============================= */
  
@media (max-width:900px){

/* HEADER SIMPLIFY */
.voice-btn,
.create-btn,
.notif,
.logo-area span{
display:none;
}

/* pendekkan search bar */
.search-ad{
max-width:60%;
margin-left:5px;
margin-right:5px;
}

/* header tidak memaksa lebar */
.header-bar{
flex-wrap:nowrap;
min-width:0;
}

/* search bar tidak memaksa lebar */
.search-ad{
max-width:50%;
min-width:0;
margin-left:5px;
margin-right:5px;
}
  
.poster-card,
.today-card{
cursor:pointer;
-webkit-tap-highlight-color:transparent;
touch-action:manipulation;
}

.badge-date,
.badge-trending,
.overlay{
pointer-events:none;
}
  
</style>
</head>

{img:"https://picsum.photos/400/300?11",title:"Nusantara",location:"Kediri",date:"2026-04-15"},

const grid=document.getElementById("poster-grid");
const todayContainer=document.getElementById("today-carousel");
const today=formatDate(new Date());

events.forEach((e,index)=>{

const isToday=formatDate(e.date)===today;

/* CAROUSEL */
if(isToday){
const c=document.createElement("div");
c.className="today-card";
c.innerHTML=`
<img src="${e.img}">
<div class="badge-date">${new Date(e.date).getDate()}</div>
<div class="badge-trending">🔥 TRENDING</div>
<div class="overlay overlay-hot">EVENT HARI INI</div>`;
c.dataset.index = index;
todayContainer.appendChild(c);
}

/* IKLAN */
if((index+1)%3===0){
const ad=getRandomAd();
if(ad){
const adCard=document.createElement("div");
adCard.className="poster-card";
adCard.innerHTML=`<a href="${ad.link}" target="_blank">
<img src="${ad.img}">
<div class="ads-label">IKLAN</div></a>`;
grid.appendChild(adCard);
}
}

/* GRID */
const card=document.createElement("div");
card.className="poster-card";
card.innerHTML=`
<img src="${e.img}">
<div class="badge-date">${new Date(e.date).getDate()}</div>
${isToday?'<div class="badge-trending">🔥 TRENDING</div>':''}
<div class="overlay ${isToday?'overlay-hot':'overlay-normal'}">
${isToday?'EVENT HARI INI':'INFO LENGKAP KLIK'}
</div>`;

grid.appendChild(card);

});

document.addEventListener("click", function(e){

const card = e.target.closest(".poster-card, .today-card");

if(!card) return;

const index = card.dataset.index;

if(index !== undefined){
openModal(events[index]);
}

});  

/* MODAL */

const modal = document.getElementById("poster-modal");
const modalImg = document.getElementById("modal-img");
const modalTitle = document.getElementById("modal-title");
const modalLocation = document.getElementById("modal-location");
const closeBtn = document.getElementById("modal-close");

function openModal(e){
modal.style.opacity="1";
modal.style.pointerEvents="auto";
modalImg.src=e.img;
modalTitle.innerText=e.title;
modalLocation.innerText=e.location;
}

function closeModal(){
modal.style.opacity="0";
modal.style.pointerEvents="none";
}

/* tombol close */
closeBtn.addEventListener("click", closeModal);
closeBtn.addEventListener("touchstart", closeModal);

/* klik background */
modal.addEventListener("click", function(e){
if(e.target === modal){
closeModal();
}
});

/* ESC keyboard */
document.addEventListener("keydown", function(e){
if(e.key === "Escape"){
closeModal();
}
});
  
</script>
