<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jadwal Reog Ponorogo April 2026</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
height:60px;
background:#111;
display:flex;
align-items:center;
padding:0 20px;
z-index:1000;
}

/* LAYOUT */
.layout{
max-width:1200px;
margin:auto;
padding:90px 20px;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:20px;
}

/* GRID */
#poster-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:14px;
}

/* CARD */
.poster-card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
position:relative;
}

.poster-card img{
width:100%;
height:160px;
object-fit:cover;
}

.poster-card:hover{
transform:scale(1.05);
}

/* BADGE DATE */
.badge-date{
position:absolute;
top:8px;
right:8px;
background:red;
color:white;
font-weight:bold;
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
z-index:2;
}

/* BADGE TRENDING */
.badge-trending{
position:absolute;
top:8px;
left:8px;
background:#ffcc00;
color:black;
font-size:11px;
font-weight:bold;
padding:4px 6px;
border-radius:6px;
z-index:2;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* OVERLAY */
.overlay{
position:absolute;
bottom:0;
left:0;
width:100%;
color:white;
text-align:center;
font-weight:bold;
letter-spacing:1px;
}

/* NORMAL (abu) */
.overlay-normal{
background:rgba(50,50,50,0.85);
font-size:12px;
padding:6px;
}

/* TRENDING (merah) */
.overlay-hot{
background:rgba(255,0,0,0.95);
font-size:14px;
padding:8px;
}

/* IKLAN */
.ads-label{
position:absolute;
top:6px;
left:6px;
background:yellow;
color:black;
font-size:10px;
padding:2px 6px;
border-radius:4px;
font-weight:bold;
}

/* MODAL */
#poster-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.98);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#poster-modal img{
max-width:90%;
max-height:80vh;
}

#modal-close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
#poster-grid{
grid-template-columns:repeat(auto-fill, 140px);
justify-content:center;
}
}
.today-section{
margin-bottom:30px;
}

.today-title{
font-size:18px;
margin-bottom:10px;
font-weight:bold;
color:#ffcc00;
}

/* CONTAINER SCROLL */
#today-carousel{
display:flex;
overflow-x:auto;
gap:12px;
padding-bottom:10px;
scroll-snap-type:x mandatory;
}

/* ITEM */
.today-card{
min-width:140px;
flex-shrink:0;
border-radius:12px;
overflow:hidden;
position:relative;
cursor:pointer;
scroll-snap-align:start;
}

.today-card img{
width:100%;
height:140px;
object-fit:cover;
}

/* biar scrollbar halus */
#today-carousel::-webkit-scrollbar{
height:6px;
}
#today-carousel::-webkit-scrollbar-thumb{
background:#444;
border-radius:10px;
}  
</style>
</head>

<body>

  if((index + 1) % 3 === 0){

    if(ad){

};

document.addEventListener("keydown",function(e){
