<style>
body{
margin:0;
font-family:'Roboto', sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
height:60px;
background:#111;
display:flex;
align-items:center;
padding:0 20px;
z-index:1000;
}

/* LAYOUT */
.layout{
max-width:1200px;
margin:auto;
padding:90px 20px;
text-align:center;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:5px;
letter-spacing:1px;
}

.subtitle{
font-size:14px;
letter-spacing:1px;
margin-bottom:20px;
opacity:0.7;
}

/* BUTTON */
.button-group{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

.btn{
display:flex;
align-items:center;
gap:6px;
padding:10px 16px;
border-radius:25px;
font-size:13px;
font-weight:bold;
text-decoration:none;
color:white;
}

.btn svg{width:16px;height:16px;}

.btn-primary{background:#25D366;}
.btn-warning{background:#ff9800;}
.btn-secondary{background:#333;}

/* TODAY BOX */
.today-section{
background:#1a1a1a;
padding:15px;
border-radius:14px;
margin-bottom:30px;
}

.today-title{
font-size:16px;
margin-bottom:10px;
font-weight:bold;
color:#ffcc00;
letter-spacing:1px;
}

#today-carousel{
display:flex;
overflow-x:auto;
gap:12px;
scroll-snap-type:x mandatory;
}

.today-card{
min-width:140px;
border-radius:12px;
overflow:hidden;
position:relative;
cursor:pointer;
scroll-snap-align:start;
}

.today-card img{
width:100%;
height:140px;
object-fit:cover;
}

/* GRID */
#poster-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:14px;
}

.poster-card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
cursor:pointer;
position:relative;
}

.poster-card img{
width:100%;
height:160px;
object-fit:cover;
}

/* BADGE */
.badge-date{
position:absolute;
top:8px;
right:8px;
background:red;
width:34px;
height:34px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-weight:bold;
z-index:2;
}

.badge-trending{
position:absolute;
top:8px;
left:8px;
background:#ffcc00;
color:black;
font-size:11px;
padding:4px 6px;
border-radius:6px;
font-weight:bold;
z-index:2;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* OVERLAY */
.overlay{
position:absolute;
bottom:0;
width:100%;
text-align:center;
font-weight:bold;
}

.overlay-normal{
background:rgba(50,50,50,0.85);
font-size:12px;
padding:6px;
}

.overlay-hot{
background:rgba(255,0,0,0.95);
font-size:14px;
padding:8px;
}

/* IKLAN */
.ads-label{
position:absolute;
top:6px;
left:6px;
background:yellow;
color:black;
font-size:10px;
padding:2px 6px;
border-radius:4px;
font-weight:bold;
}

/* MODAL */
#poster-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.98);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#poster-modal img{
max-width:90%;
max-height:80vh;
}

/* MOBILE */
@media(max-width:900px){
#poster-grid{
grid-template-columns:repeat(auto-fill, 140px);
justify-content:center;
}
}
</style>
