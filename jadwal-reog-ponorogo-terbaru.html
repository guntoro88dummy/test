<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Jadwal Reog Ponorogo April 2026</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;}
.header{position:fixed;top:0;width:100%;height:60px;background:#111;display:flex;align-items:center;padding:0 20px;}
.layout{max-width:1200px;margin:auto;padding:90px 20px;}
.title{text-align:center;font-size:28px;margin-bottom:20px;}

#poster-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
.poster-card{background:#1a1a1a;border-radius:12px;overflow:hidden;cursor:pointer;position:relative;}
.poster-card img{width:100%;height:160px;object-fit:cover;}
.poster-card:hover{transform:scale(1.05);}

.badge-date{
position:absolute;top:8px;right:8px;
background:red;color:white;font-weight:bold;
width:34px;height:34px;display:flex;
align-items:center;justify-content:center;
border-radius:50%;
}

.ads-label{
position:absolute;top:6px;left:6px;
background:yellow;color:black;
font-size:10px;padding:2px 6px;
border-radius:4px;font-weight:bold;
}

/* MODAL */
#poster-modal{
position:fixed;inset:0;
background:rgba(0,0,0,0.95);
display:none;align-items:center;justify-content:center;
flex-direction:column;
}
#poster-modal img{max-width:90%;max-height:80vh;}
#modal-close{position:absolute;top:20px;right:30px;font-size:30px;cursor:pointer;}

@media(max-width:900px){
#poster-grid{
display:grid;
grid-template-columns:repeat(auto-fill, 140px);
justify-content:center;
gap:14px;
}
</style>
</head>

<body>

<div class="header"><b>AJI MANGKARA</b></div>

<div class="layout">
<div class="title">JADWAL REOG PONOROGO</div>
<div id="poster-grid"></div>
</div>

<div id="poster-modal">
<span id="modal-close">✕</span>
<img id="modal-img">
<div id="modal-title"></div>
<div id="modal-location"></div>
</div>

<!-- LOAD DATABASE IKLAN -->
<script src="https://ajimangkara.com/iklan.js"></script>

<script>

/* AMBIL IKLAN RANDOM */
function getRandomAd(){
  if(typeof ADS_SIDEBAR === "undefined" || !ADS_SIDEBAR.length) return null;
  return ADS_SIDEBAR[Math.floor(Math.random()*ADS_SIDEBAR.length)];
}

/* DATA EVENT */
const events=[
{img:"https://picsum.photos/400/300?1",title:"Reog",location:"Ponorogo",date:"2026-04-01"},
{img:"https://picsum.photos/400/300?2",title:"Festival",location:"Madiun",date:"2026-04-02"},
{img:"https://picsum.photos/400/300?3",title:"Show",location:"Solo",date:"2026-04-03"},
{img:"https://picsum.photos/400/300?4",title:"Budaya",location:"Magetan",date:"2026-04-04"},
{img:"https://picsum.photos/400/300?5",title:"Nusantara",location:"Kediri",date:"2026-04-05"},
{img:"https://picsum.photos/400/300?6",title:"Culture",location:"Ngawi",date:"2026-04-06"},
{img:"https://picsum.photos/400/300?1",title:"Reog",location:"Ponorogo",date:"2026-04-01"},
{img:"https://picsum.photos/400/300?2",title:"Festival",location:"Madiun",date:"2026-04-02"},
{img:"https://picsum.photos/400/300?3",title:"Show",location:"Solo",date:"2026-04-03"},
{img:"https://picsum.photos/400/300?4",title:"Budaya",location:"Magetan",date:"2026-04-04"},
{img:"https://picsum.photos/400/300?5",title:"Nusantara",location:"Kediri",date:"2026-04-05"},
{img:"https://picsum.photos/400/300?6",title:"Culture",location:"Ngawi",date:"2026-04-06"},
{img:"https://picsum.photos/400/300?1",title:"Reog",location:"Ponorogo",date:"2026-04-01"},
{img:"https://picsum.photos/400/300?2",title:"Festival",location:"Madiun",date:"2026-04-02"},
{img:"https://picsum.photos/400/300?3",title:"Show",location:"Solo",date:"2026-04-03"},
{img:"https://picsum.photos/400/300?4",title:"Budaya",location:"Magetan",date:"2026-04-04"},
{img:"https://picsum.photos/400/300?5",title:"Nusantara",location:"Kediri",date:"2026-04-05"},
{img:"https://picsum.photos/400/300?6",title:"Culture",location:"Ngawi",date:"2026-04-06"},
{img:"https://picsum.photos/400/300?1",title:"Reog",location:"Ponorogo",date:"2026-04-01"},
{img:"https://picsum.photos/400/300?2",title:"Festival",location:"Madiun",date:"2026-04-02"},
{img:"https://picsum.photos/400/300?3",title:"Show",location:"Solo",date:"2026-04-03"},
{img:"https://picsum.photos/400/300?4",title:"Budaya",location:"Magetan",date:"2026-04-04"},
{img:"https://picsum.photos/400/300?5",title:"Nusantara",location:"Kediri",date:"2026-04-05"},
{img:"https://picsum.photos/400/300?6",title:"Culture",location:"Ngawi",date:"2026-04-06"}
];

/* SORT BY DATE */
events.sort((a,b)=>new Date(a.date)-new Date(b.date));

const grid=document.getElementById("poster-grid");

/* RENDER GRID */
events.forEach((e,index)=>{

  // IKLAN tiap 3 item
if((index + 1) % 3 === 0){
    const ad = getRandomAd();

    if(ad){
      const adCard=document.createElement("div");
      adCard.className="poster-card";

      adCard.innerHTML=`
      <a href="${ad.link}" target="_blank" rel="noopener">
        <img src="${ad.img}" loading="lazy">
        <div class="ads-label">IKLAN</div>
      </a>
      `;

      grid.appendChild(adCard);
    }
  }

  // EVENT
  const card=document.createElement("div");
  card.className="poster-card";

  card.innerHTML=`
  <img src="${e.img}" loading="lazy">
  <div class="badge-date">${new Date(e.date).getDate()}</div>
  `;

  card.onclick=function(){
    document.getElementById("poster-modal").style.display="flex";
    document.getElementById("modal-img").src=e.img;
    document.getElementById("modal-title").innerText=e.title;
    document.getElementById("modal-location").innerText=e.location;
  };

  grid.appendChild(card);

});

/* MODAL CONTROL */
const modal=document.getElementById("poster-modal");

document.getElementById("modal-close").onclick=()=>modal.style.display="none";

modal.onclick=function(e){
  if(e.target===modal){modal.style.display="none";}
};

document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){modal.style.display="none";}
});

</script>

</body>
</html>
