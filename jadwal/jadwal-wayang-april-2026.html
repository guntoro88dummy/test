.header{

background:#0f0f0f;

}

.header-bar{
max-width:1400px;
margin:auto;

justify-content:space-between;

padding:12px 20px;
}

.menu-toggle{

cursor:pointer;
}

.logo-area{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
font-weight:700;
}

.logo-area img{
height:24px;
}

.search-ad{
flex:1;
display:flex;
align-items:center;
justify-content:center;
height:40px;
border-radius:20px;
background:#121212;

color:#aaa;

margin-left:40px;
margin-right:10px;
}

.voice-btn{
width:40px;
height:40px;

.right-menu{

}

.create-btn{

padding:8px 12px;

color:white;
cursor:pointer;
}

.notif{
position:relative;
font-size:18px;
cursor:pointer;
}

.notif-badge{
position:absolute;
top:-6px;
right:-8px;
background:red;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:10px;
}

.channel-avatar{
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.search-ad,
.voice-btn,
.create-btn,
.notif{

}

.header-bar{
