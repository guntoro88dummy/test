<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 10px 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(0,0,0,0.9);
  color: white;
  z-index: 100;
  transition: 0.3s;
}

header.transparent {
  background: rgba(0,0,0,0.4);
}

.header-left {
  display: flex;
  gap: 10px;
}

.header-center {
  flex: 1;
  text-align: center;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
}

.header-center span {
  display: inline-block;
  animation: marquee 10s linear infinite;
}

@keyframes marquee {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* CONTENT */
.container {
  padding-top: 70px;
  padding-bottom: 150px;
}

/* MENU */
.section {
  padding: 10px;
}

.menu-grid {
  display: flex;
  gap: 12px;
  overflow-x: auto;
}

.card {
  min-width: 200px;
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.card-body {
  padding: 10px;
}

.qty {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}

.qty button {
  padding: 5px 10px;
  border: none;
  background: black;
  color: white;
  border-radius: 5px;
}

textarea {
  width: 100%;
  margin-top: 5px;
}

/* NOTA */
.cart {
  background: white;
  border-top: 2px dashed black;
  padding: 10px;
  font-family: monospace;
}

/* DESKTOP SIDEBAR */
@media(min-width:768px){
  .layout {
    display: flex;
  }

  .menu-area {
    width: 70%;
  }

  .cart {
    position: fixed;
    right: 0;
    top: 80px;
    width: 30%;
    height: 80vh;
    overflow-y: auto;
    box-shadow: -5px 0 10px rgba(0,0,0,0.1);
    transition: 0.3s;
  }

  .cart.transparent {
    opacity: 0.6;
  }
}

/* WA BUTTON */
.wa-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(45deg,#25D366,#128C7E);
  color: white;
  border: none;
  margin-top: 5px;
}
</style>
</head>

<body>

<header id="header">
  <div class="header-left">
    📍
    💬
  </div>

  <div class="header-center">
    <span>sebelum pesan hubungi toko terlebih dahulu</span>
  </div>

  <div>🔥</div>
</header>

<div class="container layout">
  <div class="menu-area" id="menu"></div>

  <div class="cart" id="cartBox">
    <div id="cartList"></div>
    <div id="total"></div>
    <button class="wa-btn" onclick="sendWA()">Pesan via WhatsApp</button>
  </div>
</div>

<script>
const data = [
  {cat:"Makanan", name:"Nasi Goreng", price:15000, img:"https://source.unsplash.com/300x200/?fried-rice"},
  {cat:"Makanan", name:"Sate", price:20000, img:"https://source.unsplash.com/300x200/?satay"},
  {cat:"Makanan", name:"Bakso", price:12000, img:"https://source.unsplash.com/300x200/?meatball"},
  {cat:"Makanan", name:"Mie Ayam", price:13000, img:"https://source.unsplash.com/300x200/?noodle"},

  {cat:"Minuman", name:"Es Teh", price:5000, img:"https://source.unsplash.com/300x200/?tea"},
  {cat:"Minuman", name:"Es Jeruk", price:7000, img:"https://source.unsplash.com/300x200/?orange-drink"},
  {cat:"Minuman", name:"Es Buah", price:10000, img:"https://source.unsplash.com/300x200/?fruit"},
  {cat:"Minuman", name:"Kopi", price:6000, img:"https://source.unsplash.com/300x200/?coffee"},

  {cat:"Camilan", name:"Tempe Goreng", price:3000, img:"https://source.unsplash.com/300x200/?tempeh"},
  {cat:"Camilan", name:"Tahu Goreng", price:3000, img:"https://source.unsplash.com/300x200/?tofu"},
  {cat:"Camilan", name:"Kerupuk", price:2000, img:"https://source.unsplash.com/300x200/?crackers"},
  {cat:"Camilan", name:"Kacang Goreng", price:4000, img:"https://source.unsplash.com/300x200/?peanut"},

  {cat:"Pedas", name:"Bakso Aci", price:15000, img:"https://source.unsplash.com/300x200/?spicy"},
  {cat:"Pedas", name:"Mie Pedas", price:12000, img:"https://source.unsplash.com/300x200/?spicy-noodle"},
  {cat:"Pedas", name:"Seblak", price:13000, img:"https://source.unsplash.com/300x200/?spicy-food"}
];

let cart = {};

function renderMenu(){
  let cats = [...new Set(data.map(d=>d.cat))];
  let html="";

  cats.forEach(cat=>{
    html+=`<div class="section"><h3>${cat}</h3><div class="menu-grid">`;

    data.forEach((item,i)=>{
      if(item.cat===cat){
        html+=`
        <div class="card">
          <img src="${item.img}">
          <div class="card-body">
            <b>${item.name}</b><br>Rp${item.price}

            <div class="qty">
              <button onclick="update(${i},-1)">-</button>
              <span id="q${i}">0</span>
              <button onclick="update(${i},1)">+</button>
            </div>

            <textarea id="n${i}" placeholder="catatan..."></textarea>
          </div>
        </div>`;
      }
    });

    html+="</div></div>";
  });

  document.getElementById("menu").innerHTML=html;
}

function update(i,val){
  let qEl=document.getElementById("q"+i);
  let qty=parseInt(qEl.innerText)+val;
  if(qty<0) qty=0;
  qEl.innerText=qty;

  let item=data[i];

  if(qty===0){
    delete cart[i];
  } else {
    cart[i]={
      ...item,
      qty,
      note:document.getElementById("n"+i).value
    };
  }

  renderCart();
}

function renderCart(){
  let html="🧾 Pesanan<br>";
  let total=0;

  Object.values(cart).forEach((c,i)=>{
    let sub=c.price*c.qty;
    total+=sub;

    html+=`${i+1}. ${c.name} (${c.qty}x)<br>`;
    if(c.note) html+=`- ${c.note}<br>`;
    html+=`Rp${sub}<br><br>`;
  });

  document.getElementById("cartList").innerHTML=html;
  document.getElementById("total").innerText="Total: Rp"+total;
}

function sendWA(){
  let text="Halo, saya ingin pesan:\n\n";
  let total=0;

  Object.values(cart).forEach((c,i)=>{
    let sub=c.price*c.qty;
    total+=sub;

    text+=`${i+1}. ${c.name} (${c.qty}x)\n`;
    if(c.note) text+=`- ${c.note}\n`;
    text+=`Rp${sub}\n\n`;
  });

  text+=`Total: Rp${total}`;

  window.open("https://wa.me/628xxxxxxxxxx?text="+encodeURIComponent(text));
}

/* HEADER TRANSPARENT */
window.addEventListener("scroll",()=>{
  let header=document.getElementById("header");
  if(window.scrollY>50){
    header.classList.add("transparent");
  } else {
    header.classList.remove("transparent");
  }
});

renderMenu();
</script>

</body>
</html>
