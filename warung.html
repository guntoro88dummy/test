<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at top left, #ffffff, #eef1f7),
    linear-gradient(180deg,#f8f9fc,#e9edf5);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.9);
  color:white;
  z-index:100;
}

.header-center{
  flex:1;
  overflow:hidden;
  white-space:nowrap;
}

.header-center span{
  display:inline-block;
  animation:marquee 10s linear infinite;
  font-size:12px;
  text-transform:uppercase;
}

@keyframes marquee{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* LAYOUT */
.container{
  padding-top:70px;
  padding-bottom:120px;
}

.menu-grid{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px;
}

/* CARD */
.card{
  min-width:220px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(12px);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,0.15);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px) scale(1.03);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{padding:10px;}

.qty{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

.qty button{
  width:32px;
  height:32px;
  border:none;
  border-radius:50%;
  background:linear-gradient(#111,#333);
  color:white;
}

textarea{
  width:100%;
  margin-top:5px;
}

/* OPSI */
.opsi{
  background:linear-gradient(135deg,#fff3e0,#f1f1f1);
  margin:10px;
  padding:12px;
  border-radius:12px;
  border-left:5px solid orange;
}

/* NOTA */
.cart{
  background:white;
  padding:15px;
  font-family:monospace;
  border-top:3px dashed black;
}

/* WA */
.wa-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(45deg,#25D366,#128C7E);
  color:white;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* DESKTOP */
@media(min-width:768px){
  .layout{display:flex;}
  .menu{width:70%;}
  .cart{
    position:fixed;
    right:0;
    top:80px;
    width:30%;
    height:80vh;
    overflow:auto;
  }
}
</style>
</head>

<body>

<header>
  <div>Warung Nusantara</div>

  <div class="header-center">
    <span>SEBELUM PESAN HUBUNGI TOKO TERLEBIH DAHULU</span>
  </div>

  <div>
    <span class="blink">🟢 TOKO BUKA</span>
  </div>
</header>

<div class="container layout">
  <div class="menu" id="menu"></div>

  <div class="cart">

    <b>Data Pemesan</b><br><br>
    <input id="nama" placeholder="Nama" style="width:100%"><br>
    <input id="alamat" placeholder="Alamat" style="width:100%"><br>
    <input id="hp" placeholder="No HP" style="width:100%"><br><br>

    <div id="cartList"></div>
    <div id="total"></div>

    <b>METODE PEMBAYARAN</b><br>
    <label><input type="radio" name="bayar" value="Cash"> Cash</label><br>
    <label><input type="radio" name="bayar" value="Transfer"> Transfer</label>

    <button class="wa-btn" onclick="sendWA()">Pesan via WhatsApp</button>

    <div style="margin-top:12px;padding:12px;border-radius:12px;background:#2c2c2c;color:#fff;">
      <b>NO REKENING:</b><br>
      BRI 31645643464616516516<br>
      MANDIRI 5616165134631564<br>
      BNI 5664564646464
    </div>

  </div>
</div>

<script>
const img="https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg";

const data=[
{cat:"Makanan",name:"Nasi Goreng",price:15000,img},
{cat:"Makanan",name:"Sate",price:20000,img},
{cat:"Makanan",name:"Bakso",price:12000,img},
{cat:"Makanan",name:"Mie Ayam",price:13000,img},

{cat:"Minuman",name:"Es Teh",price:5000,img},
{cat:"Minuman",name:"Es Jeruk",price:7000,img},

{cat:"Pedas",name:"Seblak",price:13000,img}
];

let cart={};

function renderMenu(){
  let cats=[...new Set(data.map(d=>d.cat))];
  let html="";

  cats.forEach(cat=>{
    html+=`<h3 style="padding-left:10px">${cat}</h3><div class="menu-grid">`;

    data.forEach((item,i)=>{
      if(item.cat===cat){
        let qty=cart[i]?.qty||0;

        html+=`
        <div class="card">
          <img src="${item.img}">
          <div class="card-body">
            ${item.name}<br>Rp${item.price}

            <div class="qty">
              <button onclick="update(${i},-1)">-</button>
              <span id="q${i}">${qty}</span>
              <button onclick="update(${i},1)">+</button>
            </div>

            <textarea id="n${i}" placeholder="catatan...">${cart[i]?.note||""}</textarea>
          </div>
        </div>`;
      }
    });

    html+="</div>";
  });

  html+=`
  <div class="opsi">
  <b>OPSI PENGIRIMAN</b><br>
  <label><input type="radio" name="kirim" value="Diantar" onclick="toggle('antar')"> Diantar</label><br>
  <label><input type="radio" name="kirim" value="COD" onclick="toggle('cod')"> COD</label>

  <div id="antarBox" style="display:none">
    <input id="alamatAntar" placeholder="Alamat antar">
  </div>

  <div id="codBox" style="display:none">
    <input id="lokasi" placeholder="Lokasi COD">
  </div>
  </div>
  `;

  document.getElementById("menu").innerHTML=html;
}

function toggle(t){
  antarBox.style.display="none";
  codBox.style.display="none";
  if(t==="antar") antarBox.style.display="block";
  if(t==="cod") codBox.style.display="block";
}

function update(i,val){
  let el=document.getElementById("q"+i);
  let qty=parseInt(el.innerText)+val;
  if(qty<0) qty=0;
  el.innerText=qty;

  if(qty===0) delete cart[i];
  else cart[i]={...data[i],qty,note:document.getElementById("n"+i).value};

  renderCart();
}

function renderCart(){
  let html="🧾 Pesanan<br>";
  let total=0;

  Object.values(cart).forEach((c,i)=>{
    let sub=c.price*c.qty;
    total+=sub;

    html+=`${i+1}. ${c.name} (${c.qty})<br>`;
    if(c.note) html+=`- ${c.note}<br>`;
    html+=`Rp${sub}<br><br>`;
  });

  cartList.innerHTML=html;
  total.innerText="Total: Rp"+total;
}

function sendWA(){
  let nama=nama.value;
  let alamat=alamat.value;
  let hp=hp.value;

  let text=`Halo saya ${nama}\n${alamat}\n${hp}\n\nPesan:\n`;

  Object.values(cart).forEach(c=>{
    text+=`${c.name} (${c.qty})\n`;
  });

  window.open("https://wa.me/6285331314118?text="+encodeURIComponent(text));
}

renderMenu();
</script>

</body>
</html>
