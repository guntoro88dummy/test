<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(#f6f7fb,#eaeef5);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.85);
  color:white;
  z-index:100;
  transition:0.3s;
}

header.transparent{
  background:rgba(0,0,0,0.4);
}

.header-left{font-weight:bold;}

.header-right{
  display:flex;
  gap:10px;
  font-size:12px;
}

.running{
  position:absolute;
  bottom:-18px;
  width:100%;
  text-align:center;
  font-size:11px;
}

.running span{
  display:inline-block;
  animation:marquee 10s linear infinite;
}

@keyframes marquee{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* LAYOUT */
.container{
  padding-top:80px;
  padding-bottom:120px;
}

.menu-grid{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px;
}

/* CARD */
.card{
  min-width:210px;
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.card-body{padding:10px;}

.qty{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

.qty button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  background:black;
  color:white;
}

textarea{
  width:100%;
  margin-top:5px;
}

/* NOTA */
.cart{
  background:white;
  border-top:2px dashed black;
  padding:10px;
  font-family:monospace;
  transition:0.3s;
}

.cart.fade{
  opacity:0.5;
}

.wa-btn{
  width:100%;
  padding:12px;
  background:linear-gradient(45deg,#25D366,#128C7E);
  border:none;
  color:white;
  margin-top:5px;
}

/* DESKTOP */
@media(min-width:768px){
  .layout{display:flex;}

  .menu{width:70%;}

  .cart{
    position:fixed;
    right:0;
    top:90px;
    width:30%;
    height:80vh;
    overflow:auto;
  }
}

/* ANIMATION */
.flash{
  animation:flash 0.3s;
}

@keyframes flash{
  0%{background:#d4ffd4;}
  100%{background:white;}
}
</style>
</head>

<body>

<header id="header">
  <div class="header-left">Warung Nusantara</div>

  <div class="header-right">
    📍 Map
    💬 Hubungi
  </div>

  <div class="running">
    <span>🟢 TOKO BUKA • sebelum pesan hubungi toko terlebih dahulu</span>
  </div>
</header>

<div class="container layout">
  <div class="menu" id="menu"></div>

  <div class="cart" id="cartBox">
    <div id="cartList"></div>
    <div id="total"></div>
    <button class="wa-btn" onclick="sendWA()">Pesan via WhatsApp</button>
  </div>
</div>

<script>
const data = [
  {cat:"Makanan",name:"Nasi Goreng",price:15000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Makanan",name:"Sate",price:20000,img:"https://asset.kompas.com/crops/BJdOTeUCdwHWS6ImI9qDnf3s8nI=/0x0:1000x667/1200x800/data/photo/2023/12/19/6580e31d4d33e.jpeg"},
  {cat:"Makanan",name:"Bakso",price:12000,img:"https://asset.kompas.com/crops/aShLyAiGmMhzDUPiQjF77-Jl1NA=/0x0:1000x667/1200x800/data/photo/2020/06/02/5ed5f39c7d8fe.jpg"},
  {cat:"Makanan",name:"Mie Ayam",price:13000,img:"https://source.unsplash.com/300x200/?noodle"},

  {cat:"Minuman",name:"Es Teh",price:5000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Minuman",name:"Es Jeruk",price:7000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Minuman",name:"Es Buah",price:10000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Minuman",name:"Kopi",price:6000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},

  {cat:"Camilan",name:"Tempe Goreng",price:3000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Camilan",name:"Tahu Goreng",price:3000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Camilan",name:"Kerupuk",price:2000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Camilan",name:"Kacang Goreng",price:4000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},

  {cat:"Pedas",name:"Bakso Aci",price:15000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Pedas",name:"Mie Pedas",price:12000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
  {cat:"Pedas",name:"Seblak",price:13000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || {};

function renderMenu(){
  let cats=[...new Set(data.map(d=>d.cat))];
  let html="";

  cats.forEach(cat=>{
    html+=`<h3 style="padding-left:10px">${cat}</h3><div class="menu-grid">`;

    data.forEach((item,i)=>{
      if(item.cat===cat){
        let qty=cart[i]?.qty || 0;

        html+=`
        <div class="card">
          <img src="${item.img}">
          <div class="card-body">
            <b>${item.name}</b><br>Rp${item.price}

            <div class="qty">
              <button onclick="update(${i},-1)">-</button>
              <span id="q${i}">${qty}</span>
              <button onclick="update(${i},1)">+</button>
            </div>

            <textarea id="n${i}" placeholder="catatan...">${cart[i]?.note || ""}</textarea>
          </div>
        </div>`;
      }
    });

    html+="</div>";
  });

  document.getElementById("menu").innerHTML=html;
}

function update(i,val){
  let qEl=document.getElementById("q"+i);
  let qty=parseInt(qEl.innerText)+val;
  if(qty<0) qty=0;
  qEl.innerText=qty;

  let item=data[i];

  if(qty===0){
    delete cart[i];
  } else {
    cart[i]={...item,qty,note:document.getElementById("n"+i).value};
  }

  localStorage.setItem("cart",JSON.stringify(cart));

  renderCart();
}

function removeItem(i){
  delete cart[i];
  localStorage.setItem("cart",JSON.stringify(cart));
  renderMenu();
  renderCart();
}

function renderCart(){
  let html="🧾 Pesanan<br>";
  let total=0;

  Object.entries(cart).forEach(([key,c],i)=>{
    let sub=c.price*c.qty;
    total+=sub;

    html+=`${i+1}. ${c.name} (${c.qty}x) ❌ <span onclick="removeItem(${key})" style="cursor:pointer">hapus</span><br>`;
    if(c.note) html+=`- ${c.note}<br>`;
    html+=`Rp${sub}<br><br>`;
  });

  document.getElementById("cartList").innerHTML=html;
  document.getElementById("total").innerText="Total: Rp"+total;

  document.getElementById("cartBox").classList.add("flash");
  setTimeout(()=>document.getElementById("cartBox").classList.remove("flash"),300);
}

function sendWA(){
  let text="Halo, saya ingin pesan:\n\n";
  let total=0;

  Object.values(cart).forEach((c,i)=>{
    let sub=c.price*c.qty;
    total+=sub;

    text+=`${i+1}. ${c.name} (${c.qty}x)\n`;
    if(c.note) text+=`- ${c.note}\n`;
    text+=`Rp${sub}\n\n`;
  });

  text+=`Total: Rp${total}`;

  window.open("https://wa.me/628xxxxxxxxxx?text="+encodeURIComponent(text));
}

/* HEADER EFFECT */
window.addEventListener("scroll",()=>{
  let header=document.getElementById("header");
  if(window.scrollY>50) header.classList.add("transparent");
  else header.classList.remove("transparent");
});

/* CART FADE */
setInterval(()=>{
  document.getElementById("cartBox").classList.add("fade");
},3000);

document.getElementById("cartBox").addEventListener("mouseover",()=>{
  document.getElementById("cartBox").classList.remove("fade");
});

renderMenu();
renderCart();
</script>

</body>
</html>
