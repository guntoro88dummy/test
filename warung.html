<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(#f5f7fa,#e4e8f0);
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  top:0;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:space-between;
  padding:10px;
  z-index:10;
}

.header-center{
  flex:1;
  overflow:hidden;
  white-space:nowrap;
}

.header-center span{
  animation:marquee 10s linear infinite;
}

@keyframes marquee{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

.blink{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0}}

/* LAYOUT */
.container{padding-top:70px}

/* MENU */
.menu-grid{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.card{
  min-width:200px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  overflow:hidden;
}

.card img{width:100%;height:120px;object-fit:cover}

.card-body{padding:10px}

.qty{display:flex;justify-content:space-between}

/* OPSI */
.opsi{
  background:#fff3e0;
  margin:10px;
  padding:10px;
  border-left:5px solid orange;
  border-radius:10px;
}

/* NOTA */
.cart{
  background:#fff;
  padding:15px;
  margin:10px;
  border-radius:10px;
  font-family:monospace;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.line{
  border-top:1px dashed #000;
  margin:5px 0;
}

.wa-btn{
  width:100%;
  padding:12px;
  background:green;
  color:#fff;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
<div>Warung</div>
<div class="header-center">
<span>SEBELUM PESAN HUBUNGI TOKO</span>
</div>
<div class="blink">BUKA</div>
</header>

<div class="container">

<div id="menu"></div>

<div class="opsi">
<b>OPSI PENGIRIMAN</b><br>
<label><input type="radio" name="kirim" value="Diantar">Diantar</label>
<input id="antar" placeholder="Alamat"><br>
<label><input type="radio" name="kirim" value="COD">COD</label>
<input id="cod" placeholder="Lokasi COD">
</div>

<div class="cart">

<b>DATA PEMESAN</b><br>
<input id="nama" placeholder="Nama"><br>
<input id="alamat" placeholder="Alamat"><br>
<input id="hp" placeholder="HP">

<div class="line"></div>

<div id="cartList"></div>

<div class="line"></div>

<div id="total"></div>

<div class="line"></div>

<b>PEMBAYARAN</b><br>
<input type="radio" name="bayar" value="Cash">Cash<br>
<input type="radio" name="bayar" value="Transfer">Transfer

<button class="wa-btn" onclick="wa()">Pesan WA</button>

</div>

</div>

<script>
const img="https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg";

const data=[
{name:"Nasi Goreng",price:15000,img},
{name:"Sate",price:20000,img},
{name:"Bakso",price:12000,img},
{name:"Mie Ayam",price:13000,img},
{name:"Es Teh",price:5000,img},
{name:"Es Jeruk",price:7000,img},
{name:"Seblak",price:13000,img}
];

let cart={};

function render(){
let html="<div class='menu-grid'>";

data.forEach((d,i)=>{
html+=`
<div class="card">
<img src="${d.img}">
<div class="card-body">
${d.name}<br>Rp${d.price}
<div class="qty">
<button onclick="upd(${i},-1)">-</button>
<span id="q${i}">0</span>
<button onclick="upd(${i},1)">+</button>
</div>
</div>
</div>`;
});

html+="</div>";
menu.innerHTML=html;
}

function upd(i,v){
let el=document.getElementById("q"+i);
let q=parseInt(el.innerText)+v;
if(q<0)q=0;
el.innerText=q;

if(q==0) delete cart[i];
else cart[i]={...data[i],qty:q};

draw();
}

function draw(){
let html="";
let total=0;
let no=1;

Object.keys(cart).forEach(i=>{
let c=cart[i];
let sub=c.qty*c.price;
total+=sub;

html+=`
${no}. ${c.name}
${c.qty} x ${c.price} = ${sub}
`;
no++;
});

cartList.innerText=html;
total.innerText="TOTAL: "+total;
}

function wa(){
let text=`Halo saya ${nama.value}
${alamat.value}
${hp.value}

Pesanan:
`;

Object.values(cart).forEach(c=>{
text+=`${c.name} (${c.qty})
`;
});

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

render();
</script>

</body>
</html>
