<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at top left, #ffffff, #eef1f7),
    linear-gradient(180deg,#f8f9fc,#e9edf5);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:10px 15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.9);
  color:white;
  z-index:100;
}

.header-center{
  flex:1;
  overflow:hidden;
  margin:0 10px;
  white-space:nowrap;
}

.header-center span{
  display:inline-block;
  animation:marquee 10s linear infinite;
  font-size:12px;
  text-transform:uppercase;
}

@keyframes marquee{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* CONTENT */
.container{
  padding-top:70px;
  padding-bottom:150px;
}

.menu-grid{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px;
}

/* CARD */
.card{
  min-width:220px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{padding:10px;}

.qty{
  display:flex;
  justify-content:space-between;
}

.qty button{
  width:32px;
  height:32px;
  border:none;
  border-radius:50%;
  background:black;
  color:white;
}

/* OPSI */
.opsi{
  background:linear-gradient(135deg,#fff3e0,#f1f1f1);
  margin:10px;
  padding:12px;
  border-radius:12px;
  border-left:5px solid orange;
}

/* NOTA */
.cart{
  background:#fff;
  padding:15px;
  font-family:monospace;
  border-top:3px dashed black;
}

.wa-btn{
  width:100%;
  padding:12px;
  background:green;
  color:white;
  border:none;
  margin-top:10px;
}

/* DESKTOP */
@media(min-width:768px){
  .layout{display:flex;}
  .menu{width:70%;}
  .cart{
    position:fixed;
    right:0;
    top:80px;
    width:30%;
    height:80vh;
    overflow:auto;
  }
}
</style>
</head>

<body>

<header>
  <div>Warung Nusantara</div>

  <div class="header-center">
    <span>SEBELUM PESAN HUBUNGI TOKO TERLEBIH DAHULU</span>
  </div>

  <div>
    <span class="blink">🟢 TOKO BUKA</span>
  </div>
</header>

<div class="container layout">
  <div class="menu" id="menu"></div>

  <div class="cart">

    <b>Data Pemesan</b><br><br>
    <input id="nama" placeholder="Nama"><br>
    <input id="alamat" placeholder="Alamat"><br>
    <input id="hp" placeholder="No HP"><br><br>

    <div id="cartList"></div>
    <div id="total"></div>

    <b>METODE PEMBAYARAN</b><br>
    <label><input type="radio" name="bayar" value="Cash"> Cash</label><br>
    <label><input type="radio" name="bayar" value="Transfer"> Transfer</label>

    <button class="wa-btn" onclick="sendWA()">Pesan via WhatsApp</button>

    <!-- REKENING (FIX POSISI) -->
    <div style="margin-top:12px;padding:12px;border-radius:12px;background:#2c2c2c;color:#fff;">
      <b>NO REKENING:</b><br>
      BRI 31645643464616516516<br>
      MANDIRI 5616165134631564<br>
      BNI 5664564646464<br><br>
      <i>Kirim bukti transfer via WhatsApp</i>
    </div>

  </div>
</div>

<script>
const imgSample="https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg";

const data=[
{name:"Nasi Goreng",price:15000,img:imgSample},
{name:"Sate",price:20000,img:imgSample},
{name:"Bakso",price:12000,img:imgSample},
{name:"Mie Ayam",price:13000,img:imgSample}
];

let cart={};

function renderMenu(){
  let html="<div class='menu-grid'>";

  data.forEach((item,i)=>{
    html+=`
    <div class="card">
      <img src="${item.img}">
      <div class="card-body">
        ${item.name}<br>Rp${item.price}

        <div class="qty">
          <button onclick="update(${i},-1)">-</button>
          <span id="q${i}">0</span>
          <button onclick="update(${i},1)">+</button>
        </div>
      </div>
    </div>`;
  });

  html+="</div>";

  document.getElementById("menu").innerHTML=html;
}

function update(i,val){
  let el=document.getElementById("q"+i);
  let qty=parseInt(el.innerText)+val;
  if(qty<0) qty=0;
  el.innerText=qty;

  if(qty===0) delete cart[i];
  else cart[i]={...data[i],qty};

  renderCart();
}

function renderCart(){
  let html="";
  let total=0;

  Object.values(cart).forEach((c,i)=>{
    let sub=c.price*c.qty;
    total+=sub;
    html+=`${c.name} (${c.qty}) Rp${sub}<br>`;
  });

  document.getElementById("cartList").innerHTML=html;
  document.getElementById("total").innerText="Total: Rp"+total;
}

function sendWA(){
  let nama=document.getElementById("nama").value;
  let alamat=document.getElementById("alamat").value;
  let hp=document.getElementById("hp").value;

  let text=`Halo saya ${nama}\n${alamat}\n${hp}\n\nPesan:\n`;

  Object.values(cart).forEach(c=>{
    text+=`${c.name} (${c.qty})\n`;
  });

  window.open("https://wa.me/6285331314118?text="+encodeURIComponent(text));
}

renderMenu();
</script>

</body>
</html>
