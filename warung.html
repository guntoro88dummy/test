<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #111;
  color: #fff;
  padding: 15px;
  position: sticky;
  top: 0;
  z-index: 10;
}

/* MENU */
.section {
  padding: 10px;
}

.section h2 {
  margin: 10px 0;
}

/* GRID SCROLL */
.menu-grid {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.card {
  min-width: 200px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card-body {
  padding: 10px;
}

.qty {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.qty button {
  padding: 5px 10px;
}

textarea {
  width: 100%;
  margin-top: 5px;
}

.add {
  width: 100%;
  margin-top: 5px;
  background: #111;
  color: #fff;
  border: none;
  padding: 8px;
  border-radius: 5px;
}

/* NOTA */
.cart {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 2px dashed #000;
  padding: 10px;
  max-height: 220px;
  overflow-y: auto;
  font-family: monospace;
}

.wa-btn {
  width: 100%;
  background: #25D366;
  color: #fff;
  border: none;
  padding: 10px;
  margin-top: 5px;
}

</style>
</head>

<body>

<header>
  <h3>Warung Nusantara 🔥</h3>
</header>

<div id="menu"></div>

<div class="cart">
  <div id="cartList"></div>
  <div id="total"></div>
  <button class="wa-btn" onclick="sendWA()">Pesan via WhatsApp</button>
</div>

<script>
const data = [
  {cat:"Makanan", name:"Nasi Goreng", price:15000, img:"https://source.unsplash.com/300x200/?fried-rice"},
  {cat:"Makanan", name:"Sate", price:20000, img:"https://source.unsplash.com/300x200/?satay"},
  {cat:"Makanan", name:"Bakso", price:12000, img:"https://source.unsplash.com/300x200/?meatball-soup"},
  {cat:"Makanan", name:"Mie Ayam", price:13000, img:"https://source.unsplash.com/300x200/?chicken-noodle"},

  {cat:"Minuman", name:"Es Teh", price:5000, img:"https://source.unsplash.com/300x200/?iced-tea"},
  {cat:"Minuman", name:"Es Jeruk", price:7000, img:"https://source.unsplash.com/300x200/?orange-juice"},
  {cat:"Minuman", name:"Es Buah", price:10000, img:"https://source.unsplash.com/300x200/?fruit-ice"},
  {cat:"Minuman", name:"Kopi", price:6000, img:"https://source.unsplash.com/300x200/?coffee"},

  {cat:"Camilan", name:"Tempe Goreng", price:3000, img:"https://source.unsplash.com/300x200/?fried-tempeh"},
  {cat:"Camilan", name:"Tahu Goreng", price:3000, img:"https://source.unsplash.com/300x200/?fried-tofu"},
  {cat:"Camilan", name:"Kerupuk", price:2000, img:"https://source.unsplash.com/300x200/?crackers"},
  {cat:"Camilan", name:"Kacang Goreng", price:4000, img:"https://source.unsplash.com/300x200/?peanuts"},

  {cat:"Pedas", name:"Bakso Aci", price:15000, img:"https://source.unsplash.com/300x200/?spicy-noodle"},
  {cat:"Pedas", name:"Mie Pedas", price:12000, img:"https://source.unsplash.com/300x200/?spicy-noodle"},
  {cat:"Pedas", name:"Seblak", price:13000, img:"https://source.unsplash.com/300x200/?spicy-food"}
];

let cart = [];

function renderMenu(){
  let categories = [...new Set(data.map(d=>d.cat))];
  let html = "";

  categories.forEach(cat=>{
    html += `<div class="section"><h2>${cat}</h2><div class="menu-grid">`;

    data.filter(d=>d.cat==cat).forEach((item,i)=>{
      html += `
      <div class="card">
        <img src="${item.img}">
        <div class="card-body">
          <b>${item.name}</b><br>
          Rp${item.price}

          <div class="qty">
            <button onclick="qty(${i},-1)">-</button>
            <span id="q${i}">1</span>
            <button onclick="qty(${i},1)">+</button>
          </div>

          <textarea id="n${i}" placeholder="catatan..."></textarea>

          <button class="add" onclick="add(${i})">Tambah</button>
        </div>
      </div>
      `;
    });

    html += "</div></div>";
  });

  document.getElementById("menu").innerHTML = html;
}

function qty(i,v){
  let el=document.getElementById("q"+i);
  let val=parseInt(el.innerText)+v;
  if(val<1) val=1;
  el.innerText=val;
}

function add(i){
  let item=data[i];
  let q=parseInt(document.getElementById("q"+i).innerText);
  let note=document.getElementById("n"+i).value;

  cart.push({...item, qty:q, note});
  renderCart();
}

function renderCart(){
  let html="🧾 Pesanan<br>";
  let total=0;

  cart.forEach((c,i)=>{
    let sub=c.price*c.qty;
    total+=sub;

    html+=`${i+1}. ${c.name} (${c.qty}x)<br>`;
    if(c.note) html+=`- ${c.note}<br>`;
    html+=`Rp${sub}<br><br>`;
  });

  document.getElementById("cartList").innerHTML=html;
  document.getElementById("total").innerText="Total: Rp"+total;
}

function sendWA(){
  let text="Halo, saya ingin pesan:\n\n";
  let total=0;

  cart.forEach((c,i)=>{
    let sub=c.price*c.qty;
    total+=sub;

    text+=`${i+1}. ${c.name} (${c.qty}x)\n`;
    if(c.note) text+=`- ${c.note}\n`;
    text+=`Rp${sub}\n\n`;
  });

  text+=`Total: Rp${total}`;

  window.open("https://wa.me/628xxxxxxxxxx?text="+encodeURIComponent(text));
}

renderMenu();
</script>

</body>
</html>
