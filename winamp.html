<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Nawolo Radio</title>

<style>
body {
  background: #1b1b1b;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  font-family: Tahoma;
}

/* RADIO BODY */
.radio {
  width: 700px;
  background: #3b2b1f;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 30px #000;
}

/* TOP */
.top {
  display: flex;
  gap: 10px;
}

/* VIDEO (KIRI) */
.video {
  width: 50%;
  background: #000;
}

.video iframe {
  width: 100%;
  height: 200px;
  border: none;
}

/* DISPLAY (KANAN) */
.display {
  width: 50%;
  background: #111;
  color: #f5d97a;
  padding: 10px;
  font-family: monospace;
  font-size: 14px;
}

/* SEARCH */
.search {
  margin-top: 10px;
  display: flex;
}

.search input {
  flex: 1;
  padding: 8px;
  border: none;
}

.search button {
  padding: 8px;
  cursor: pointer;
}

/* PLAYLIST */
.playlist {
  margin-top: 10px;
  max-height: 200px;
  overflow-y: auto;
  background: #222;
}

/* ITEM */
.item {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.item:hover {
  background: #444;
}

.delete {
  color: red;
}
</style>
</head>

<body>

<div class="radio">

  <div class="top">

    <!-- VIDEO -->
    <div class="video">
      <iframe id="yt"
        src="https://www.youtube.com/embed/kTJczUoc26U?mute=1"
        allow="autoplay">
      </iframe>
    </div>

    <!-- DISPLAY -->
    <div class="display" id="display">
      📻 NAWOLO RADIO<br>
      Ready...
    </div>

  </div>

  <!-- SEARCH -->
  <div class="search">
    <input id="q" placeholder="Cari lagu / artis">
    <button onclick="search()">SEARCH</button>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist" id="playlist"></div>

</div>

<script>
let db = [
  {title:"Sheila On 7 - Dan", id:"kTJczUoc26U"},
  {title:"Dewa 19 - Kangen", id:"fJ9rUzIMcZQ"},
  {title:"Ungu - Demi Waktu", id:"RgKAFK5djSk"},
  {title:"NOAH - Separuh Aku", id:"OPf0YbXqDm0"}
];

let list = [...db];
let current = 0;

/* RENDER */
function render(){
  let html="";
  list.forEach((item,i)=>{
    html += `
    <div class="item">
      <span onclick="play('${item.id}','${item.title}')">${item.title}</span>
      <span class="delete" onclick="remove(${i})">✖</span>
    </div>`;
  });

  document.getElementById("playlist").innerHTML = html;
}

/* PLAY */
function play(id,title){
  document.getElementById("yt").src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;

  document.getElementById("display").innerHTML =
    `📻 NAWOLO RADIO<br>Now Playing:<br>${title}`;
}

/* SEARCH (LOCAL) */
function search(){
  let q = document.getElementById("q").value.toLowerCase();

  list = db.filter(x => x.title.toLowerCase().includes(q));

  render();
}

/* DELETE */
function remove(i){
  list.splice(i,1);
  render();
}

render();
</script>

</body>
</html>
