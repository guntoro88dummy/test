<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Nawolo Winamp</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0a0a0a;
  font-family: Tahoma, sans-serif;
}

/* BOX UTAMA */
.player {
  width: 360px;
  background: #2b2b2b;
  border: 2px solid #000;
  box-shadow: 0 0 20px #000;
}

/* TITLE BAR */
.titlebar {
  background: linear-gradient(#3a3a3a, #1a1a1a);
  padding: 4px;
  font-size: 12px;
  color: #0f0;
  display: flex;
  justify-content: space-between;
}

/* DISPLAY */
.display {
  background: #001100;
  color: #00ff66;
  font-family: monospace;
  padding: 6px;
  font-size: 12px;
}

/* VIDEO */
.video iframe {
  width: 100%;
  height: 120px;
  border: none;
}

/* CONTROLS */
.controls {
  display: flex;
  justify-content: center;
  padding: 5px;
  gap: 5px;
}

.btn {
  width: 30px;
  height: 20px;
  background: #444;
  border: 1px solid #111;
  cursor: pointer;
  text-align: center;
  line-height: 20px;
  font-size: 12px;
}

.btn:hover {
  background: #666;
}

/* EQUALIZER */
.eq {
  display: flex;
  justify-content: center;
  padding: 5px;
  gap: 2px;
  border-top: 1px solid #000;
  border-bottom: 1px solid #000;
}

.eq span {
  width: 4px;
  background: #0f0;
  animation: eq 0.4s infinite alternate;
}

@keyframes eq {
  from { height: 5px; }
  to { height: 25px; }
}

/* PLAYLIST */
.playlist {
  max-height: 150px;
  overflow-y: auto;
  font-size: 12px;
}

.playlist div {
  padding: 5px;
  border-bottom: 1px solid #111;
  cursor: pointer;
}

.playlist div:hover {
  background: #444;
}
</style>
</head>

<body>

<div class="player">

  <!-- TITLE -->
  <div class="titlebar">
    <span>🎧 NAWOLO</span>
    <span>_ □ X</span>
  </div>

  <!-- DISPLAY -->
  <div class="display" id="display">
    Ready...
  </div>

  <!-- VIDEO (SUDAH ADA DEFAULT) -->
  <div class="video">
    <iframe id="yt"
      src="https://www.youtube.com/embed/kTJczUoc26U?mute=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="btn" onclick="prev()">⏮</div>
    <div class="btn" onclick="playCurrent()">▶</div>
    <div class="btn" onclick="pause()">⏸</div>
    <div class="btn" onclick="next()">⏭</div>
  </div>

  <!-- EQUALIZER -->
  <div class="eq">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist" id="playlist"></div>

</div>

<script>
let list = [
  {id:"kTJczUoc26U", title:"Sheila On 7 - Dan"},
  {id:"y6120QOlsfU", title:"Darude - Sandstorm"},
  {id:"3JZ_D3ELwOQ", title:"Uptown Funk"},
  {id:"fLexgOxsZu0", title:"24K Magic"}
];

let current = 0;

function render(){
  let html="";
  list.forEach((item,i)=>{
    html += `<div onclick="play(${i})">${item.title}</div>`;
  });
  document.getElementById("playlist").innerHTML = html;
}

function play(i){
  current = i;
  let item = list[i];

  document.getElementById("yt").src =
    `https://www.youtube.com/embed/${item.id}?autoplay=1&mute=1&rel=0`;

  document.getElementById("display").innerText = item.title;
}

function playCurrent(){
  play(current);
}

function next(){
  current = (current+1) % list.length;
  play(current);
}

function prev(){
  current = (current-1+list.length) % list.length;
  play(current);
}

function pause(){
  document.getElementById("yt").src =
    `https://www.youtube.com/embed/${list[current].id}?mute=1`;
}

render();
</script>

</body>
</html>
