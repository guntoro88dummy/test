<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Nawolo Radio</title>

<style>
body {
  background: #111;
  font-family: Tahoma;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* RADIO PNG */
.radio {
  width: 720px;
  height: 300px;
  background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgsOy-qVff7WLiLM7y1AI-yk_TEIu7DTSRTQZwvWnZuCPZpqBXXl2BJOq5_wANf-aYTDVBAQXX4t20RoC28eBZX_wZwzCOWOriCtTc4FQz7I37K_QHKJbprke5qT2J3_GfZLZ7qUPdF_ELthMbSlMquKQK3-2LHQbJNtpfcUhamFU9ybh_dW5JJKE4XBQM/s1600/old%20radio.png') no-repeat center;
  background-size: 100% 100%;
  position: relative;
  margin-top: 20px;
}

/* VIDEO (KIRI SPEAKER) */
.video {
  position: absolute;
  top: 70px;
  left: 40px;
  width: 300px;
  height: 160px;
  background: #000;
}

.video iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* INFO LAGU */
.info {
  position: absolute;
  top: 235px;
  left: 40px;
  width: 300px;
  font-size: 12px;
  color: #f5d97a;
  text-align: center;
  font-family: monospace;
}

/* SEARCH */
.search {
  margin-top: 15px;
  width: 720px;
  display: flex;
}

.search input {
  flex: 1;
  padding: 10px;
  border: none;
}

.search button {
  padding: 10px;
  cursor: pointer;
}

/* PLAYLIST */
.playlist {
  width: 720px;
  max-height: 200px;
  overflow-y: auto;
  background: #222;
  margin-top: 5px;
}

/* ITEM */
.item {
  padding: 10px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.item:hover {
  background: #444;
}

.delete {
  color: red;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- RADIO -->
<div class="radio">

  <!-- VIDEO -->
  <div class="video">
    <iframe id="yt"
      src="https://www.youtube.com/embed/kTJczUoc26U?mute=1"
      allow="autoplay">
    </iframe>
  </div>

  <!-- INFO -->
  <div class="info" id="info">
    📻 NAWOLO RADIO
  </div>

</div>

<!-- SEARCH -->
<div class="search">
  <input id="q" placeholder="Cari lagu / artis...">
  <button onclick="search()">SEARCH</button>
</div>

<!-- PLAYLIST -->
<div class="playlist" id="playlist"></div>

<script>
let db = [
  {title:"Sheila On 7 - Dan", id:"kTJczUoc26U"},
  {title:"Dewa 19 - Kangen", id:"fJ9rUzIMcZQ"},
  {title:"NOAH - Separuh Aku", id:"OPf0YbXqDm0"},
  {title:"Ungu - Demi Waktu", id:"RgKAFK5djSk"}
];

let list = [...db];

/* RENDER */
function render(){
  let html="";
  list.forEach((item,i)=>{
    html += `
    <div class="item">
      <span onclick="play('${item.id}','${item.title}')">${item.title}</span>
      <span class="delete" onclick="remove(${i})">✖</span>
    </div>`;
  });

  document.getElementById("playlist").innerHTML = html;
}

/* PLAY */
function play(id,title){
  document.getElementById("yt").src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;

  document.getElementById("info").innerText = title;
}

/* SEARCH */
function search(){
  let q = document.getElementById("q").value.toLowerCase();

  list = db.filter(x => x.title.toLowerCase().includes(q));

  render();
}

/* DELETE */
function remove(i){
  list.splice(i,1);
  render();
}

render();
</script>

</body>
</html>
